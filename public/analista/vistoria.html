<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vistoria — Detalhe</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* ── Vistoria header ─────────────────────────── */
    .vis-header {
      background: #fff;
      border-radius: 10px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .vis-header h2  { font-size: 18px; color: #1565c0; margin-bottom: 4px; }
    .vis-header p   { font-size: 13px; color: #888; }
    .vis-acoes      { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Área section ────────────────────────────── */
    .area-section {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .area-hdr {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      background: #f5f7fa;
      border-bottom: 1px solid #e8eaf0;
      user-select: none;
    }
    .area-hdr h3      { font-size: 15px; color: #333; }
    .area-hdr .count  { font-size: 12px; color: #aaa; }
    .area-hdr .arrow  { font-size: 12px; color: #aaa; margin-left: 8px; }
    .area-body        { display: none; }
    .area-body.open   { display: block; }

    /* ── Item row ────────────────────────────────── */
    .item-row {
      padding: 14px 20px;
      border-bottom: 1px solid #f0f2f5;
    }
    .item-row:last-child { border-bottom: none; }
    .item-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    /* ── Occurrence card ─────────────────────────── */
    .oc-card {
      border: 1px solid #e8eaf0;
      border-left: 4px solid #ccc;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      background: #fafafa;
    }
    .oc-card.ok      { border-left-color: #388e3c; background: #f1f8f2; }
    .oc-card.atencao { border-left-color: #f57c00; background: #fffaf0; }
    .oc-card.critico { border-left-color: #d32f2f; background: #fff5f5; }

    .oc-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .oc-num  { font-size: 11px; color: #aaa; margin-bottom: 3px; font-weight: 700; text-transform: uppercase; }
    .oc-desc { font-size: 14px; color: #333; }
    .oc-rec  { font-size: 13px; color: #e65100; margin-top: 5px; }
    .oc-acoes { display: flex; gap: 6px; flex-shrink: 0; }

    .fotos-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .foto-slot {
      width: 110px;
      height: 90px;
      border: 2px dashed #ddd;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #bbb;
      font-size: 12px;
      gap: 4px;
    }
    .foto-slot img { width: 100%; height: 100%; object-fit: cover; }
    .foto-slot span { font-size: 22px; }
    .foto-del {
      position: absolute;
      top: 3px;
      right: 3px;
      background: rgba(0,0,0,.5);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-add-oc {
      margin-top: 8px;
      padding: 6px 12px;
      background: none;
      border: 1.5px dashed #90caf9;
      color: #1565c0;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-add-oc:hover { background: #e3f2fd; }
    .item-sem-oc { font-size: 13px; color: #bbb; margin-bottom: 8px; font-style: italic; }

    /* ── Modal rec field ─────────────────────────── */
    .rec-group { display: none; }
    .rec-group.visivel { display: block; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <nav class="navbar">
    <span class="navbar-brand">🏗️ Vistoria Online</span>
    <div class="navbar-nav">
      <a href="/analista/index.html">Dashboard</a>
      <a href="/analista/vistorias.html">Vistorias</a>
      <a href="#" onclick="logout()">Sair</a>
    </div>
    <span class="navbar-user" id="navbar-user"></span>
  </nav>

  <div class="container main-content">

    <!-- Header da vistoria -->
    <div class="vis-header" id="vis-header">
      <div>
        <h2 id="h-titulo">Carregando...</h2>
        <p id="h-sub"></p>
      </div>
      <div class="vis-acoes" id="vis-acoes"></div>
    </div>

    <!-- Checklist estruturado por área -->
    <div id="checklist-areas"></div>

  </div>

  <!-- Input file oculto para upload de foto -->
  <input type="file" id="file-input" accept="image/*" onchange="uploadFoto()" />

  <!-- Modal: Nova/Editar ocorrência -->
  <div class="modal-overlay" id="modal-oc">
    <div class="modal" style="max-width:520px">
      <div class="modal-header">
        <h3 id="modal-titulo">Nova Ocorrência</h3>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="alert alert-error" id="modal-erro"></div>
      <div class="form-group">
        <label>Descrição *</label>
        <textarea id="oc-descricao" rows="3" placeholder="Descreva o que foi encontrado..."></textarea>
      </div>
      <div class="form-group">
        <label>Status *</label>
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:6px">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
            <input type="radio" name="oc-status" value="ok" checked /> ✅ OK
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
            <input type="radio" name="oc-status" value="atencao" /> ⚠️ Atenção
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
            <input type="radio" name="oc-status" value="critico" /> 🚨 Crítico
          </label>
        </div>
      </div>
      <div class="form-group rec-group" id="rec-group">
        <label>Recomendação</label>
        <textarea id="oc-recomendacao" rows="2" placeholder="O que deve ser feito para corrigir..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-neutral btn-sm" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary btn-sm" id="btn-salvar" onclick="salvarOcorrencia()">Salvar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireLogin, getUser, auth, vistorias, ocorrencias } from '/js/api.js';

    requireLogin();
    document.getElementById('navbar-user').textContent = getUser()?.nome || '';

    const params = new URLSearchParams(location.search);
    const visId  = params.get('id');
    if (!visId) { alert('ID da vistoria não informado.'); history.back(); }

    let editandoOcId = null;
    let contextoOc   = null; // { areaId, itemId }
    let uploadOcId   = null;
    let uploadSlot   = null;
    let editavel     = false;

    // Radio status → mostra/esconde campo rec
    document.querySelectorAll('input[name="oc-status"]').forEach(r => {
      r.addEventListener('change', () => {
        const v = document.querySelector('input[name="oc-status"]:checked').value;
        document.getElementById('rec-group').classList.toggle('visivel', ['atencao','critico'].includes(v));
      });
    });

    // ── Carrega vistoria ──────────────────────────
    async function carregar() {
      try {
        const token = localStorage.getItem('token');
        const r = await fetch(`/api/vistorias/${visId}/checklist`, {
          headers: { Authorization: 'Bearer ' + token }
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Erro ao carregar');
        editavel = d.vistoria.status === 'em_andamento';
        renderHeader(d.vistoria);
        renderChecklist(d.areas);
      } catch (err) {
        document.getElementById('h-titulo').textContent = 'Erro ao carregar vistoria';
        console.error(err);
      }
    }

    // ── Header ────────────────────────────────────
    const badgeStatus = {
      em_andamento: '<span class="badge badge-orange">Em andamento</span>',
      finalizada:   '<span class="badge badge-blue">Finalizada</span>',
      publicada:    '<span class="badge badge-green">Publicada</span>'
    };

    function renderHeader(vis) {
      document.getElementById('h-titulo').textContent = vis.unidade_nome || '—';
      document.getElementById('h-sub').innerHTML =
        `${vis.empresa_nome || ''} &nbsp;·&nbsp; ` +
        `${new Date(vis.data_criacao).toLocaleDateString('pt-BR')} &nbsp;·&nbsp; ` +
        (badgeStatus[vis.status] || vis.status);

      const acoes = document.getElementById('vis-acoes');
      if (vis.status === 'em_andamento') {
        acoes.innerHTML = `<button class="btn btn-warning btn-sm" onclick="finalizar()">Finalizar</button>`;
      } else if (vis.status === 'finalizada') {
        acoes.innerHTML = `
          <button class="btn btn-neutral btn-sm" onclick="baixarPDF()">⬇ PDF Completo</button>
          <button class="btn btn-danger  btn-sm" onclick="baixarPDFPendencias()">⬇ Pendências</button>
          <button class="btn btn-success btn-sm" onclick="publicar()">Publicar</button>`;
      } else if (vis.status === 'publicada') {
        acoes.innerHTML = `
          <button class="btn btn-neutral btn-sm" onclick="baixarPDF()">⬇ PDF Completo</button>
          <button class="btn btn-danger  btn-sm" onclick="baixarPDFPendencias()">⬇ Pendências</button>`;
      }
    }

    // ── Checklist ─────────────────────────────────
    function renderChecklist(areas) {
      const div = document.getElementById('checklist-areas');
      if (!areas?.length) {
        div.innerHTML = '<p style="color:#aaa;text-align:center;padding:32px">Nenhuma área configurada.</p>';
        return;
      }
      div.innerHTML = areas.map((area, ai) => renderArea(area, ai)).join('');
      toggleArea(0); // abre primeira área
    }

    function renderArea(area, ai) {
      const comOc = area.itens.filter(i => i.ocorrencias.length > 0).length;
      return `
        <div class="area-section">
          <div class="area-hdr" onclick="toggleArea(${ai})" id="area-hdr-${ai}">
            <h3>${area.area_nome}</h3>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="count">${comOc}/${area.itens.length} itens com ocorrências</span>
              <span class="arrow" id="area-arr-${ai}">▾</span>
            </div>
          </div>
          <div class="area-body" id="area-body-${ai}">
            ${area.itens.map((item, ii) => renderItem(area, item, ai, ii)).join('')}
          </div>
        </div>`;
    }

    function renderItem(area, item, ai, ii) {
      const ocs = item.ocorrencias || [];
      return `
        <div class="item-row" id="item-row-${ai}-${ii}">
          <div class="item-title">${item.descricao}</div>
          <div id="ocs-${ai}-${ii}">
            ${ocs.length
              ? ocs.map(oc => renderOcCard(oc)).join('')
              : `<div class="item-sem-oc">Nenhuma ocorrência registrada.</div>`}
          </div>
          ${editavel
            ? `<button class="btn-add-oc"
                onclick="abrirModal('${area.area_id}','${item.item_id}')">
                + Adicionar ocorrência
              </button>`
            : ''}
        </div>`;
    }

    function renderOcCard(oc) {
      const foto1 = oc.foto_1_signed || oc.foto_1_url;
      const foto2 = oc.foto_2_signed || oc.foto_2_url;
      return `
        <div class="oc-card ${oc.status || ''}">
          <div class="oc-top">
            <div>
              <div class="oc-num">Ocorrência #${oc.numero_ocorrencia}</div>
              <div class="oc-desc">${oc.descricao}</div>
              ${oc.recomendacao ? `<div class="oc-rec">💡 ${oc.recomendacao}</div>` : ''}
            </div>
            ${editavel ? `
            <div class="oc-acoes">
              <button class="btn btn-neutral btn-sm"
                onclick="abrirEdicao('${oc.id}','${esc(oc.descricao)}','${oc.status}','${esc(oc.recomendacao||'')}')">
                Editar
              </button>
              <button class="btn btn-danger btn-sm" onclick="deletarOc('${oc.id}')">Excluir</button>
            </div>` : ''}
          </div>
          <div class="fotos-row">
            ${renderFotoSlot(oc, 1, foto1)}
            ${renderFotoSlot(oc, 2, foto2)}
          </div>
        </div>`;
    }

    function renderFotoSlot(oc, slot, url) {
      if (url) return `
        <div class="foto-slot" onclick="verFoto('${url}')" title="Ver foto">
          <img src="${url}" alt="Foto ${slot}" />
          ${editavel ? `<button class="foto-del" onclick="event.stopPropagation();deletarFoto('${oc.id}',${slot})">✕</button>` : ''}
        </div>`;
      if (editavel) return `
        <div class="foto-slot" onclick="iniciarUpload('${oc.id}',${slot})" title="Adicionar foto">
          <span>📷</span>Foto ${slot}
        </div>`;
      return `<div class="foto-slot"><span style="font-size:18px">—</span></div>`;
    }

    window.toggleArea = (ai) => {
      const body = document.getElementById(`area-body-${ai}`);
      const arr  = document.getElementById(`area-arr-${ai}`);
      if (!body) return;
      const open = body.classList.toggle('open');
      if (arr) arr.textContent = open ? '▴' : '▾';
    };

    // ── Modal ─────────────────────────────────────
    window.abrirModal = (areaId, itemId) => {
      editandoOcId = null;
      contextoOc   = { areaId, itemId };
      document.getElementById('modal-titulo').textContent = 'Nova Ocorrência';
      document.getElementById('oc-descricao').value       = '';
      document.getElementById('oc-recomendacao').value    = '';
      document.querySelector('input[name="oc-status"][value="ok"]').checked = true;
      document.getElementById('rec-group').classList.remove('visivel');
      document.getElementById('modal-erro').classList.remove('show');
      document.getElementById('modal-oc').classList.add('show');
    };

    window.abrirEdicao = (id, descricao, status, recomendacao) => {
      editandoOcId = id;
      contextoOc   = null;
      document.getElementById('modal-titulo').textContent  = 'Editar Ocorrência';
      document.getElementById('oc-descricao').value        = descricao;
      document.getElementById('oc-recomendacao').value     = recomendacao;
      const radio = document.querySelector(`input[name="oc-status"][value="${status}"]`);
      if (radio) radio.checked = true;
      document.getElementById('rec-group').classList.toggle('visivel', ['atencao','critico'].includes(status));
      document.getElementById('modal-erro').classList.remove('show');
      document.getElementById('modal-oc').classList.add('show');
    };

    window.fecharModal = () => document.getElementById('modal-oc').classList.remove('show');

    window.salvarOcorrencia = async () => {
      const descricao    = document.getElementById('oc-descricao').value.trim();
      const status       = document.querySelector('input[name="oc-status"]:checked').value;
      const recomendacao = document.getElementById('oc-recomendacao').value.trim();
      const erro = document.getElementById('modal-erro');
      const btn  = document.getElementById('btn-salvar');

      if (!descricao) {
        erro.textContent = 'Descrição é obrigatória.';
        erro.classList.add('show');
        return;
      }
      erro.classList.remove('show');
      btn.disabled = true;
      try {
        const body = { descricao, status, recomendacao: recomendacao || null, origem: 'web' };
        if (editandoOcId) {
          await ocorrencias.editar(editandoOcId, body);
        } else {
          body.area_id = contextoOc.areaId;
          body.item_id = contextoOc.itemId;
          await ocorrencias.criar(visId, body);
        }
        fecharModal();
        carregar();
      } catch (err) {
        erro.textContent = err.message;
        erro.classList.add('show');
      } finally {
        btn.disabled = false;
      }
    };

    window.deletarOc = async (id) => {
      if (!confirm('Excluir esta ocorrência?')) return;
      try { await ocorrencias.deletar(id); carregar(); }
      catch (err) { alert(err.message); }
    };

    // ── Upload fotos ──────────────────────────────
    window.iniciarUpload = (ocId, slot) => { uploadOcId = ocId; uploadSlot = slot; document.getElementById('file-input').click(); };

    window.uploadFoto = async () => {
      const file = document.getElementById('file-input').files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append('foto', file);
      fd.append('slot', String(uploadSlot));
      try {
        const r = await fetch(`/api/ocorrencias/${uploadOcId}/fotos`, {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + localStorage.getItem('token') },
          body: fd
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Erro no upload');
        document.getElementById('file-input').value = '';
        carregar();
      } catch (err) { alert(err.message); }
    };

    window.deletarFoto = async (ocId, slot) => {
      if (!confirm(`Remover foto ${slot}?`)) return;
      const r = await fetch(`/api/ocorrencias/${ocId}/fotos/${slot}`, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
      });
      const d = await r.json();
      if (!r.ok) { alert(d.error); return; }
      carregar();
    };

    window.verFoto = (url) => window.open(url, '_blank');

    // ── Finalizar / Publicar / PDF ────────────────
    window.finalizar = async () => {
      if (!confirm('Finalizar esta vistoria? Não será mais possível editar ocorrências.')) return;
      try { await vistorias.finalizar(visId); carregar(); }
      catch (err) { alert(err.message); }
    };
    window.publicar = async () => {
      if (!confirm('Publicar esta vistoria? Ela ficará visível para os moradores.')) return;
      try { await vistorias.publicar(visId); carregar(); }
      catch (err) { alert(err.message); }
    };

    function downloadPDF(url, filename) {
      fetch(url, { headers: { Authorization: 'Bearer ' + localStorage.getItem('token') } })
        .then(r => { if (!r.ok) throw new Error('Erro ao gerar PDF'); return r.blob(); })
        .then(blob => { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); URL.revokeObjectURL(a.href); })
        .catch(err => alert(err.message));
    }
    window.baixarPDF = () => downloadPDF(`/api/vistorias/${visId}/pdf`, `vistoria-${visId.slice(0,8)}.pdf`);
    window.baixarPDFPendencias = () => downloadPDF(`/api/vistorias/${visId}/pdf/pendencias`, `pendencias-${visId.slice(0,8)}.pdf`);
    window.logout = async () => { await auth.logout(); window.location.href = '/index.html'; };

    function esc(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    carregar();
  </script>

</body>
</html>
