<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Tarefas · VistorIA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" />
  <style>
    .badge-pendente    { background: #e9ecef; color: #6c757d; }
    .badge-em_andamento{ background: #fff3cd; color: #856404; }
    .badge-concluida   { background: #cfe2ff; color: #084298; }
    .badge-aprovada    { background: #d1e7dd; color: #0a3622; }

    .tarefa-row {
      padding: 14px 16px;
      border-bottom: 1px solid var(--tblr-border-color-light, #f0f2f5);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .tarefa-row:last-child { border-bottom: none; }
    .tarefa-info { flex: 1; min-width: 0; }
    .tarefa-desc { font-size: 14px; font-weight: 600; color: #333; }
    .tarefa-meta { font-size: 12px; color: #888; margin-top: 3px; }
    .tarefa-plano { font-size: 12px; color: #555; margin-top: 2px; }
    .tarefa-acoes { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    .prazo-vencido { color: #c62828; font-weight: 600; }
    .prazo-hoje    { color: #f57c00; font-weight: 600; }
  </style>
</head>
<body class="antialiased">

  <!-- ── Navbar ─────────────────────────────────────────────── -->
  <header class="navbar navbar-expand-md d-print-none">
    <div class="container-xl">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a href="/analista/index.html" class="navbar-brand">
        <img src="/img/logo-vistoria.png" alt="VistorIA" height="32" class="navbar-brand-image me-2" />
      </a>
      <div class="navbar-nav flex-row order-md-last gap-2 align-items-center">
        <span class="d-none d-md-block text-muted fs-5" id="navbar-user"></span>
        <a href="#" class="btn btn-ghost-secondary btn-icon" onclick="logout()" title="Sair">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2"/><path d="M9 12h12l-3 -3m0 6l3 -3"/></svg>
        </a>
      </div>
      <div class="collapse navbar-collapse" id="navbar-menu">
        <ul class="navbar-nav">
          <li class="nav-item"><a href="/analista/index.html" class="nav-link"><span class="nav-link-title">Dashboard</span></a></li>
          <li class="nav-item" id="nav-vistorias"><a href="/analista/vistorias.html" class="nav-link"><span class="nav-link-title">Vistorias</span></a></li>
          <li class="nav-item active"><a href="/analista/minhas-tarefas.html" class="nav-link"><span class="nav-link-title">Minhas Tarefas</span></a></li>
        </ul>
      </div>
    </div>
  </header>

  <!-- ── Page ───────────────────────────────────────────────── -->
  <div class="page-wrapper">
    <div class="page-header d-print-none">
      <div class="container-xl">
        <div class="row g-2 align-items-center">
          <div class="col">
            <div class="page-pretitle">Planos de Ação</div>
            <h2 class="page-title">Minhas Tarefas</h2>
          </div>
          <div class="col-auto ms-auto">
            <!-- Filtro de status -->
            <select id="filtro-status" class="form-select form-select-sm" onchange="filtrar()">
              <option value="">Todos os status</option>
              <option value="pendente">Pendente</option>
              <option value="em_andamento">Em andamento</option>
              <option value="concluida">Concluída</option>
              <option value="aprovada">Aprovada</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="page-body">
      <div class="container-xl">

        <!-- Resumo -->
        <div class="row g-2 mb-3" id="resumo-cards">
          <div class="col-6 col-md-3">
            <div class="card card-sm text-center">
              <div class="card-body py-2">
                <div class="h2 mb-0" id="cnt-pendente">—</div>
                <div class="text-muted small">Pendentes</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card card-sm text-center">
              <div class="card-body py-2">
                <div class="h2 mb-0 text-warning" id="cnt-em_andamento">—</div>
                <div class="text-muted small">Em andamento</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card card-sm text-center">
              <div class="card-body py-2">
                <div class="h2 mb-0 text-primary" id="cnt-concluida">—</div>
                <div class="text-muted small">Concluídas</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card card-sm text-center">
              <div class="card-body py-2">
                <div class="h2 mb-0 text-success" id="cnt-aprovada">—</div>
                <div class="text-muted small">Aprovadas</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Lista de tarefas -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Tarefas atribuídas a mim</h3>
          </div>
          <div id="lista-tarefas">
            <div class="text-center text-muted py-4">
              <div class="spinner-border spinner-border-sm me-2" role="status"></div>Carregando...
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Modal: Atualizar Status ────────────────────────────── -->
  <div class="modal modal-blur fade" id="modal-status" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Atualizar Status</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-danger d-none" id="status-erro"></div>
          <div class="mb-2">
            <label class="form-label">Tarefa</label>
            <div class="text-muted small" id="modal-tarefa-desc">—</div>
          </div>
          <div class="mb-3">
            <label class="form-label required">Novo status</label>
            <select id="novo-status" class="form-select">
              <option value="pendente">Pendente</option>
              <option value="em_andamento">Em andamento</option>
              <option value="concluida">Concluída</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-link link-secondary me-auto" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-salvar-status" onclick="salvarStatus()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
  <script type="module">
    import { requireLogin, getUser, auth, planosAcao } from '/js/api.js';

    requireLogin();
    const user = getUser();
    document.getElementById('navbar-user').textContent = user?.nome || '';

    // Gestores não veem "Vistorias" no nav (não é o fluxo deles)
    if (user?.perfil === 'gestor') {
      document.getElementById('nav-vistorias')?.classList.add('d-none');
    }

    const podeAprovar = ['admin', 'gestor'].includes(user?.perfil);

    const BADGE = {
      pendente:    '<span class="badge badge-pendente">Pendente</span>',
      em_andamento:'<span class="badge badge-em_andamento">Em andamento</span>',
      concluida:   '<span class="badge badge-concluida">Concluída</span>',
      aprovada:    '<span class="badge badge-aprovada">Aprovada</span>'
    };

    let todasTarefas = [];
    let tarefaEditandoId = null;

    function escapeHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatarPrazo(prazo) {
      if (!prazo) return '<span class="text-muted">Sem prazo</span>';
      const d     = new Date(prazo + 'T00:00:00');
      const hoje  = new Date(); hoje.setHours(0,0,0,0);
      const diff  = d - hoje;
      const label = d.toLocaleDateString('pt-BR');
      if (diff < 0)     return `<span class="prazo-vencido">⚠ ${label} (vencido)</span>`;
      if (diff === 0)   return `<span class="prazo-hoje">● ${label} (hoje)</span>`;
      return `<span>${label}</span>`;
    }

    function renderTarefa(t) {
      const item  = t.plano_acao_itens;
      const plano = item?.planos_acao;
      const vis   = plano?.vistorias;
      const unidade = vis?.unidades?.nome || '—';
      const empresa = vis?.unidades?.empresas?.nome || '';
      const planoUrl = plano ? `/analista/plano-acao.html?id=${plano.id}` : '#';

      let btnAcao = '';
      if (t.status !== 'aprovada') {
        btnAcao = `<button class="btn btn-sm btn-ghost-secondary" onclick="abrirModalStatus('${t.id}','${escapeHtml(t.descricao)}','${t.status}')">Atualizar</button>`;
      }
      if (podeAprovar && t.status === 'concluida') {
        btnAcao += `<button class="btn btn-sm btn-ghost-success" onclick="aprovar('${t.id}')">✓ Aprovar</button>`;
      }

      return `
        <div class="tarefa-row" id="tr-${t.id}">
          <div class="tarefa-info">
            <div class="tarefa-desc">${escapeHtml(t.descricao)}</div>
            <div class="tarefa-meta">
              Prazo: ${formatarPrazo(t.prazo)}
            </div>
            <div class="tarefa-plano">
              Plano: <a href="${planoUrl}">${escapeHtml(plano?.titulo || '—')}</a>
              · ${escapeHtml(unidade)}${empresa ? ' — ' + escapeHtml(empresa) : ''}
            </div>
          </div>
          <div class="tarefa-acoes">
            ${BADGE[t.status] || t.status}
            ${btnAcao}
          </div>
        </div>`;
    }

    function renderLista(tarefas) {
      const el = document.getElementById('lista-tarefas');
      if (!tarefas.length) {
        el.innerHTML = '<div class="text-center text-muted py-4">Nenhuma tarefa encontrada.</div>';
        return;
      }
      el.innerHTML = tarefas.map(t => renderTarefa(t)).join('');
    }

    window.filtrar = () => {
      const status = document.getElementById('filtro-status').value;
      const filtradas = status ? todasTarefas.filter(t => t.status === status) : todasTarefas;
      renderLista(filtradas);
    };

    async function carregar() {
      try {
        const r = await planosAcao.minhasTarefas();
        todasTarefas = r.data || [];

        // Resumo
        const cnt = { pendente: 0, em_andamento: 0, concluida: 0, aprovada: 0 };
        todasTarefas.forEach(t => { if (cnt[t.status] !== undefined) cnt[t.status]++; });
        Object.keys(cnt).forEach(k => {
          document.getElementById(`cnt-${k}`).textContent = cnt[k];
        });

        renderLista(todasTarefas);
      } catch (err) {
        document.getElementById('lista-tarefas').innerHTML =
          `<div class="text-danger text-center py-3">${err.message}</div>`;
      }
    }

    // ── Modal atualizar status ─────────────────────────────────
    window.abrirModalStatus = (id, desc, statusAtual) => {
      tarefaEditandoId = id;
      document.getElementById('modal-tarefa-desc').textContent = desc;
      document.getElementById('novo-status').value = statusAtual;
      document.getElementById('status-erro').classList.add('d-none');
      window.bootstrap.Modal.getOrCreateInstance(document.getElementById('modal-status')).show();
    };

    window.salvarStatus = async () => {
      const novoStatus = document.getElementById('novo-status').value;
      const erroEl     = document.getElementById('status-erro');
      const btn        = document.getElementById('btn-salvar-status');
      btn.disabled = true;
      erroEl.classList.add('d-none');
      try {
        await planosAcao.editarTarefa(tarefaEditandoId, { status: novoStatus });
        window.bootstrap.Modal.getOrCreateInstance(document.getElementById('modal-status')).hide();
        await carregar();
      } catch (err) {
        erroEl.textContent = err.message;
        erroEl.classList.remove('d-none');
      } finally { btn.disabled = false; }
    };

    // ── Aprovar tarefa ─────────────────────────────────────────
    window.aprovar = async (id) => {
      try {
        await planosAcao.aprovarTarefa(id);
        await carregar();
      } catch (err) { alert(err.message); }
    };

    window.logout = async () => { await auth.logout(); window.location.href = '/index.html'; };

    carregar();
  </script>
</body>
</html>
