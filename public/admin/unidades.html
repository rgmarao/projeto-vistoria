<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Unidades · VistorIA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" />
</head>
<body class="antialiased">

  <header class="navbar navbar-expand-md d-print-none">
    <div class="container-xl">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a href="/admin/index.html" class="navbar-brand">
        <img src="/img/logo-vistoria.png" alt="VistorIA" height="32" class="navbar-brand-image me-2" />
      </a>
      <div class="navbar-nav flex-row order-md-last gap-2 align-items-center">
        <span class="d-none d-md-block text-muted fs-5" id="navbar-user"></span>
        <a href="#" class="btn btn-ghost-secondary btn-icon" onclick="logout()" title="Sair">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2"/><path d="M9 12h12l-3 -3m0 6l3 -3"/></svg>
        </a>
      </div>
      <div class="collapse navbar-collapse" id="navbar-menu">
        <ul class="navbar-nav">
          <li class="nav-item"><a href="/admin/index.html" class="nav-link"><span class="nav-link-title">Dashboard</span></a></li>
          <li class="nav-item"><a href="/admin/empresas.html" class="nav-link"><span class="nav-link-title">Empresas</span></a></li>
          <li class="nav-item active"><a href="/admin/unidades.html" class="nav-link"><span class="nav-link-title">Unidades</span></a></li>
          <li class="nav-item"><a href="/admin/itens.html" class="nav-link"><span class="nav-link-title">Itens</span></a></li>
          <li class="nav-item"><a href="/admin/usuarios.html" class="nav-link"><span class="nav-link-title">Usuários</span></a></li>
        </ul>
      </div>
    </div>
  </header>

  <div class="page-wrapper">
    <div class="page-header d-print-none">
      <div class="container-xl">
        <div class="row g-2 align-items-center">
          <div class="col">
            <div class="page-pretitle">Administração</div>
            <h2 class="page-title">Unidades</h2>
          </div>
          <div class="col-auto ms-auto d-print-none">
            <button class="btn btn-primary" onclick="abrirModalCriar()">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Nova Unidade
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="page-body">
      <div class="container-xl">

        <!-- Filtros -->
        <div class="card mb-3">
          <div class="card-body">
            <div class="row g-2">
              <div class="col-md-4">
                <select id="filtro-empresa" class="form-select" onchange="carregar()">
                  <option value="">Todas as empresas</option>
                </select>
              </div>
              <div class="col-md-3">
                <select id="filtro-ativo" class="form-select" onchange="carregar()">
                  <option value="">Todos os status</option>
                  <option value="true">Ativas</option>
                  <option value="false">Inativas</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Tabela -->
        <div class="card">
          <div class="table-responsive">
            <table class="table table-vcenter table-hover card-table">
              <thead>
                <tr>
                  <th class="w-1">Logo</th>
                  <th>Nome</th>
                  <th>Empresa</th>
                  <th class="d-none d-md-table-cell">Endereço</th>
                  <th class="w-1">Status</th>
                  <th class="w-1">Ações</th>
                </tr>
              </thead>
              <tbody id="tabela-unidades">
                <tr><td colspan="6" class="text-center text-muted py-4">
                  <div class="spinner-border spinner-border-sm me-2" role="status"></div>Carregando...
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Criar / Editar -->
  <div class="modal modal-blur fade" id="modal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-titulo">Nova Unidade</h5>
          <button type="button" class="btn-close" onclick="fecharModal()"></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-danger d-none" id="modal-erro"></div>
          <div class="mb-3">
            <label class="form-label required">Empresa</label>
            <select id="campo-empresa" class="form-select"></select>
          </div>
          <div class="mb-3">
            <label class="form-label required">Nome</label>
            <input type="text" id="campo-nome" class="form-control" placeholder="Nome da unidade" />
          </div>
          <div class="mb-3">
            <label class="form-label">Endereço</label>
            <input type="text" id="campo-endereco" class="form-control" placeholder="Endereço completo" />
          </div>
          <div class="mb-2">
            <label class="form-label">Logo</label>
            <input type="file" id="campo-logo" class="form-control" accept="image/jpeg,image/png,image/webp" onchange="previewLogo()" />
            <div id="logo-preview" class="d-none align-items-center gap-2 mt-2">
              <img id="logo-preview-img" src="" alt="Preview" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid #ddd" />
              <button class="btn btn-sm btn-ghost-danger" type="button" onclick="removerLogoPreview()">Remover</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-link link-secondary me-auto" onclick="fecharModal()">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-salvar" onclick="salvar()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
  <script type="module">
    import { requireLogin, requireRole, getUser, auth } from '/js/api.js';
    import { empresas, unidades } from '/js/api.js';

    requireLogin();
    requireRole('admin');
    document.getElementById('navbar-user').textContent = getUser()?.nome || '';

    let editandoId   = null;
    let logoAtualUrl = null;

    const getModal = () => window.bootstrap.Modal.getOrCreateInstance(document.getElementById('modal'));

    async function carregarEmpresas() {
      const res  = await empresas.listar();
      const opts = (res.data || []).map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
      document.getElementById('filtro-empresa').innerHTML =
        `<option value="">Todas as empresas</option>${opts}`;
      document.getElementById('campo-empresa').innerHTML =
        `<option value="">Selecione a empresa...</option>${opts}`;
    }

    window.carregar = async function() {
      const tbody      = document.getElementById('tabela-unidades');
      const empresa_id = document.getElementById('filtro-empresa').value;
      const ativo      = document.getElementById('filtro-ativo').value;
      try {
        const params = {};
        if (empresa_id) params.empresa_id = empresa_id;
        if (ativo !== '') params.ativo = ativo;

        const res = await unidades.listar(params);
        if (!res.data?.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Nenhuma unidade encontrada.</td></tr>';
          return;
        }
        tbody.innerHTML = res.data.map(u => `
          <tr>
            <td>
              ${u.logo_url
                ? `<span class="avatar avatar-sm" style="background-image:url(${u.logo_url_assinada || ''})"></span>`
                : `<span class="avatar avatar-sm bg-secondary-lt text-secondary">🏢</span>`}
            </td>
            <td class="fw-medium">${u.nome}</td>
            <td class="text-muted">${u.empresas?.nome || '—'}</td>
            <td class="text-muted d-none d-md-table-cell">${u.endereco || '—'}</td>
            <td><span class="badge ${u.ativo ? 'bg-success-lt text-success' : 'bg-danger-lt text-danger'}">${u.ativo ? 'Ativa' : 'Inativa'}</span></td>
            <td class="text-nowrap">
              <a href="/admin/estrutura.html?id=${u.id}" class="btn btn-sm btn-ghost-secondary">Estrutura</a>
              <button class="btn btn-sm btn-ghost-secondary"
                onclick="editar('${u.id}','${esc(u.nome)}','${esc(u.endereco||'')}','${u.empresa_id}','${u.logo_url_assinada||''}')">
                Editar
              </button>
              <button class="btn btn-sm ${u.ativo ? 'btn-ghost-danger' : 'btn-ghost-success'}"
                onclick="toggleAtivo('${u.id}',${u.ativo})">
                ${u.ativo ? 'Desativar' : 'Ativar'}
              </button>
            </td>
          </tr>`).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-danger text-center">${err.message}</td></tr>`;
      }
    };

    window.abrirModalCriar = () => {
      editandoId = null; logoAtualUrl = null;
      document.getElementById('modal-titulo').textContent = 'Nova Unidade';
      document.getElementById('campo-nome').value     = '';
      document.getElementById('campo-endereco').value = '';
      document.getElementById('campo-logo').value     = '';
      document.getElementById('campo-empresa').value  = '';
      document.getElementById('logo-preview').classList.add('d-none');
      document.getElementById('modal-erro').classList.add('d-none');
      getModal().show();
    };

    window.editar = (id, nome, endereco, empresa_id, logoUrl) => {
      editandoId = id; logoAtualUrl = logoUrl || null;
      document.getElementById('modal-titulo').textContent = 'Editar Unidade';
      document.getElementById('campo-nome').value     = nome;
      document.getElementById('campo-endereco').value = endereco;
      document.getElementById('campo-empresa').value  = empresa_id;
      document.getElementById('campo-logo').value     = '';
      document.getElementById('modal-erro').classList.add('d-none');
      if (logoUrl) {
        document.getElementById('logo-preview-img').src = logoUrl;
        document.getElementById('logo-preview').classList.remove('d-none');
        document.getElementById('logo-preview').classList.add('d-flex');
      } else {
        document.getElementById('logo-preview').classList.add('d-none');
        document.getElementById('logo-preview').classList.remove('d-flex');
      }
      getModal().show();
    };

    window.fecharModal = () => getModal().hide();

    window.previewLogo = () => {
      const file = document.getElementById('campo-logo').files[0];
      if (!file) return;
      document.getElementById('logo-preview-img').src = URL.createObjectURL(file);
      document.getElementById('logo-preview').classList.remove('d-none');
      document.getElementById('logo-preview').classList.add('d-flex');
    };

    window.removerLogoPreview = () => {
      document.getElementById('campo-logo').value = '';
      document.getElementById('logo-preview').classList.add('d-none');
      document.getElementById('logo-preview').classList.remove('d-flex');
      logoAtualUrl = null;
    };

    window.salvar = async () => {
      const nome       = document.getElementById('campo-nome').value.trim();
      const endereco   = document.getElementById('campo-endereco').value.trim();
      const empresa_id = document.getElementById('campo-empresa').value;
      const logoFile   = document.getElementById('campo-logo').files[0];
      const erro       = document.getElementById('modal-erro');
      const btn        = document.getElementById('btn-salvar');

      if (!nome) { erro.textContent = 'Nome é obrigatório.'; erro.classList.remove('d-none'); return; }
      if (!editandoId && !empresa_id) { erro.textContent = 'Selecione a empresa.'; erro.classList.remove('d-none'); return; }

      btn.disabled = true;
      erro.classList.add('d-none');
      try {
        const fd = new FormData();
        fd.append('nome', nome);
        fd.append('endereco', endereco);
        if (!editandoId) fd.append('empresa_id', empresa_id);
        if (logoFile) fd.append('logo', logoFile);
        if (editandoId) await unidades.editar(editandoId, fd);
        else            await unidades.criar(fd);
        fecharModal();
        carregar();
      } catch (err) {
        erro.textContent = err.message;
        erro.classList.remove('d-none');
      } finally { btn.disabled = false; }
    };

    window.toggleAtivo = async (id, ativo) => {
      try {
        if (ativo) await unidades.desativar(id);
        else       await unidades.ativar(id);
        carregar();
      } catch (err) { alert(err.message); }
    };

    window.logout = async () => { await auth.logout(); window.location.href = '/index.html'; };
    function esc(str) { return str.replace(/'/g, "\\'"); }

    await carregarEmpresas();
    carregar();
  </script>

</body>
</html>
