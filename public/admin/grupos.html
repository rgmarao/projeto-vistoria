<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Grupos de Verificação · VistorIA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" />
</head>
<body class="antialiased">

  <!-- Navbar -->
  <header class="navbar navbar-expand-md d-print-none">
    <div class="container-xl">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a href="/admin/index.html" class="navbar-brand">
        <img src="/img/logo-vistoria.png" alt="VistorIA" height="32" class="navbar-brand-image me-2" />
      </a>
      <div class="navbar-nav flex-row order-md-last gap-2 align-items-center">
        <span class="d-none d-md-block text-muted fs-5" id="navbar-user"></span>
        <a href="#" class="btn btn-ghost-secondary btn-icon" onclick="logout()" title="Sair">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
            <path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2"/>
            <path d="M9 12h12l-3 -3m0 6l3 -3"/>
          </svg>
        </a>
      </div>
      <div class="collapse navbar-collapse" id="navbar-menu">
        <ul class="navbar-nav">
          <li class="nav-item"><a href="/admin/index.html" class="nav-link"><span class="nav-link-title">Dashboard</span></a></li>
          <li class="nav-item"><a href="/admin/empresas.html" class="nav-link"><span class="nav-link-title">Empresas</span></a></li>
          <li class="nav-item"><a href="/admin/unidades.html" class="nav-link"><span class="nav-link-title">Unidades</span></a></li>
          <li class="nav-item active"><a href="/admin/itens.html" class="nav-link"><span class="nav-link-title">Itens</span></a></li>
          <li class="nav-item"><a href="/admin/usuarios.html" class="nav-link"><span class="nav-link-title">Usuários</span></a></li>
        </ul>
      </div>
    </div>
  </header>

  <div class="page-wrapper">
    <div class="page-header d-print-none">
      <div class="container-xl">
        <div class="row g-2 align-items-center">
          <div class="col">
            <div class="page-pretitle">
              <a href="/admin/itens.html" class="text-muted">← Itens de Verificação</a>
            </div>
            <h2 class="page-title">
              Grupos de Verificação
              <span class="text-muted fw-normal fs-4 ms-2" id="count-badge"></span>
            </h2>
          </div>
          <div class="col-auto ms-auto d-print-none">
            <button class="btn btn-primary" onclick="abrirModalCriar()">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24"
                viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Novo Grupo
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="page-body">
      <div class="container-xl">
        <!-- Filtros -->
        <div class="card mb-3">
          <div class="card-body">
            <div class="row g-2">
              <div class="col">
                <div class="input-group">
                  <span class="input-group-text">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                      viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"
                      stroke-linecap="round" stroke-linejoin="round">
                      <circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/>
                    </svg>
                  </span>
                  <input type="text" id="filtro-busca" class="form-control"
                    placeholder="Buscar por nome..." oninput="filtrar()" />
                </div>
              </div>
              <div class="col-auto">
                <select id="filtro-ativo" class="form-select" onchange="filtrar()">
                  <option value="">Todos</option>
                  <option value="true" selected>Ativos</option>
                  <option value="false">Inativos</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Tabela -->
        <div class="card">
          <div class="table-responsive">
            <table class="table table-vcenter table-hover card-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th class="w-1">Status</th>
                  <th class="w-1">Ações</th>
                </tr>
              </thead>
              <tbody id="tabela-grupos">
                <tr>
                  <td colspan="3" class="text-center text-muted py-4">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    Carregando...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Criar / Editar -->
  <div class="modal modal-blur fade" id="modal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-titulo">Novo Grupo</h5>
          <button type="button" class="btn-close" onclick="fecharModal()"></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-danger d-none" id="modal-erro"></div>
          <div class="mb-2">
            <label class="form-label required">Nome do Grupo</label>
            <input type="text" id="campo-nome" class="form-control"
              placeholder="Ex.: Segurança do Trabalho, Infraestrutura..." />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-link link-secondary me-auto"
            onclick="fecharModal()">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-salvar"
            onclick="salvar()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>

  <script type="module">
    import { requireLogin, requireRole, getUser, auth, grupos } from '/js/api.js';

    requireLogin();
    requireRole('admin');
    document.getElementById('navbar-user').textContent = getUser()?.nome || '';

    let editandoId = null;
    let todosGrupos = [];

    function getModal() {
      return window.bootstrap.Modal.getOrCreateInstance(document.getElementById('modal'));
    }

    async function carregar() {
      try {
        const res = await grupos.listar();
        todosGrupos = res.data || [];
        filtrar();
      } catch (err) {
        document.getElementById('tabela-grupos').innerHTML =
          `<tr><td colspan="3" class="text-danger text-center">${err.message}</td></tr>`;
      }
    }

    window.filtrar = () => {
      const busca = document.getElementById('filtro-busca').value.toLowerCase();
      const ativo = document.getElementById('filtro-ativo').value;

      let lista = todosGrupos;
      if (ativo !== '') lista = lista.filter(g => String(g.ativo) === ativo);
      if (busca)        lista = lista.filter(g => g.nome.toLowerCase().includes(busca));

      document.getElementById('count-badge').textContent = `(${lista.length})`;

      const tbody = document.getElementById('tabela-grupos');
      if (!lista.length) {
        tbody.innerHTML =
          '<tr><td colspan="3" class="text-center text-muted py-4">Nenhum grupo encontrado.</td></tr>';
        return;
      }
      tbody.innerHTML = lista.map(g => `
        <tr>
          <td>${g.nome}</td>
          <td>
            <span class="badge ${g.ativo ? 'bg-success-lt text-success' : 'bg-danger-lt text-danger'}">
              ${g.ativo ? 'Ativo' : 'Inativo'}
            </span>
          </td>
          <td class="text-nowrap">
            <button class="btn btn-sm btn-ghost-secondary"
              onclick="editar('${g.id}', ${JSON.stringify(g.nome).replace(/"/g, '&quot;')})">
              Editar
            </button>
            <button class="btn btn-sm ${g.ativo ? 'btn-ghost-danger' : 'btn-ghost-success'}"
              onclick="toggleAtivo('${g.id}', ${g.ativo})">
              ${g.ativo ? 'Desativar' : 'Ativar'}
            </button>
            <button class="btn btn-sm btn-ghost-danger"
              onclick="deletar('${g.id}', ${JSON.stringify(g.nome).replace(/"/g, '&quot;')})">
              Excluir
            </button>
          </td>
        </tr>`).join('');
    };

    window.abrirModalCriar = () => {
      editandoId = null;
      document.getElementById('modal-titulo').textContent = 'Novo Grupo';
      document.getElementById('campo-nome').value = '';
      document.getElementById('modal-erro').classList.add('d-none');
      getModal().show();
      setTimeout(() => document.getElementById('campo-nome').focus(), 300);
    };

    window.editar = (id, nome) => {
      editandoId = id;
      document.getElementById('modal-titulo').textContent = 'Editar Grupo';
      document.getElementById('campo-nome').value = nome;
      document.getElementById('modal-erro').classList.add('d-none');
      getModal().show();
    };

    window.fecharModal = () => getModal().hide();

    window.salvar = async () => {
      const nome   = document.getElementById('campo-nome').value.trim();
      const erroEl = document.getElementById('modal-erro');
      const btn    = document.getElementById('btn-salvar');

      if (!nome) {
        erroEl.textContent = 'Nome é obrigatório.';
        erroEl.classList.remove('d-none');
        return;
      }
      btn.disabled = true;
      erroEl.classList.add('d-none');
      try {
        if (editandoId) await grupos.editar(editandoId, { nome });
        else            await grupos.criar({ nome });
        fecharModal();
        carregar();
      } catch (err) {
        erroEl.textContent = err.message;
        erroEl.classList.remove('d-none');
      } finally {
        btn.disabled = false;
      }
    };

    window.toggleAtivo = async (id, ativo) => {
      try {
        if (ativo) await grupos.desativar(id);
        else       await grupos.ativar(id);
        carregar();
      } catch (err) { alert(err.message); }
    };

    window.deletar = async (id, nome) => {
      if (!confirm(`Excluir o grupo "${nome}"? Só é possível se não houver itens associados.`)) return;
      try {
        await grupos.deletar(id);
        carregar();
      } catch (err) { alert(err.message); }
    };

    window.logout = async () => { await auth.logout(); window.location.href = '/index.html'; };

    carregar();
  </script>

</body>
</html>
