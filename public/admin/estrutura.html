<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Estrutura de Vistoria · VistorIA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" />
  <style>
    .area-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      margin-bottom: 4px;
      background: var(--tblr-bg-surface-secondary);
      transition: border-color .15s, background .15s;
      gap: 8px;
    }
    .area-item:hover  { background: var(--tblr-primary-lt); }
    .area-item.active { border-color: var(--tblr-primary); background: var(--tblr-primary-lt); }
    .area-item.inativa { opacity: .55; }
    .area-item-nome  { font-size: 14px; font-weight: 500; flex: 1; }
    .area-item-acoes { display: flex; gap: 4px; flex-shrink: 0; }

    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--tblr-border-color);
      gap: 8px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-descricao { font-size: 14px; flex: 1; }

    .itens-busca-lista {
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid var(--tblr-border-color);
      border-radius: 6px;
      margin-top: 8px;
    }
    .item-opcao {
      padding: 9px 14px;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 1px solid var(--tblr-border-color-light, #f0f0f0);
      transition: background .1s;
    }
    .item-opcao:last-child  { border-bottom: none; }
    .item-opcao:hover       { background: var(--tblr-primary-lt); }
    .item-opcao.selecionado { background: #bbdefb; }
  </style>
</head>
<body class="antialiased">

  <header class="navbar navbar-expand-md d-print-none">
    <div class="container-xl">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a href="/admin/index.html" class="navbar-brand">
        <img src="/img/logo-vistoria.png" alt="VistorIA" height="32" class="navbar-brand-image me-2" />
      </a>
      <div class="navbar-nav flex-row order-md-last gap-2 align-items-center">
        <span class="d-none d-md-block text-muted fs-5" id="navbar-user"></span>
        <a href="#" class="btn btn-ghost-secondary btn-icon" onclick="logout()" title="Sair">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2"/><path d="M9 12h12l-3 -3m0 6l3 -3"/></svg>
        </a>
      </div>
      <div class="collapse navbar-collapse" id="navbar-menu">
        <ul class="navbar-nav">
          <li class="nav-item"><a href="/admin/index.html" class="nav-link"><span class="nav-link-title">Dashboard</span></a></li>
          <li class="nav-item"><a href="/admin/empresas.html" class="nav-link"><span class="nav-link-title">Empresas</span></a></li>
          <li class="nav-item active"><a href="/admin/unidades.html" class="nav-link"><span class="nav-link-title">Unidades</span></a></li>
          <li class="nav-item"><a href="/admin/itens.html" class="nav-link"><span class="nav-link-title">Itens</span></a></li>
          <li class="nav-item"><a href="/admin/usuarios.html" class="nav-link"><span class="nav-link-title">Usuários</span></a></li>
        </ul>
      </div>
    </div>
  </header>

  <div class="page-wrapper">
    <div class="page-header d-print-none">
      <div class="container-xl">
        <div class="row g-2 align-items-center">
          <div class="col">
            <div class="page-pretitle">
              <a href="/admin/unidades.html" class="text-muted">← Unidades</a>
            </div>
            <h2 class="page-title" id="titulo-unidade">Estrutura de Vistoria</h2>
          </div>
        </div>
      </div>
    </div>

    <div class="page-body">
      <div class="container-xl">
        <div class="row g-3 align-items-start">

          <!-- ── Coluna Áreas ── -->
          <div class="col-md-4">
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">Áreas</h3>
                <div class="card-options">
                  <button class="btn btn-primary btn-sm" onclick="abrirModalArea()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Área
                  </button>
                </div>
              </div>
              <div class="card-body" id="lista-areas">
                <div class="text-center text-muted py-3">
                  <div class="spinner-border spinner-border-sm me-2" role="status"></div>Carregando...
                </div>
              </div>
            </div>
          </div>

          <!-- ── Coluna Itens ── -->
          <div class="col-md-8">
            <div class="card">
              <div class="card-header">
                <h3 class="card-title" id="itens-titulo">Selecione uma área</h3>
                <div class="card-options">
                  <button class="btn btn-primary btn-sm d-none" id="btn-add-item" onclick="abrirModalAddItem()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Adicionar Item
                  </button>
                </div>
              </div>
              <div id="lista-itens">
                <div class="text-center text-muted py-4">Selecione uma área para ver seus itens.</div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Modal Criar/Editar Área -->
  <div class="modal modal-blur fade" id="modal-area" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-area-titulo">Nova Área</h5>
          <button type="button" class="btn-close" onclick="fecharModalArea()"></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-danger d-none" id="area-erro"></div>
          <div class="mb-2">
            <label class="form-label required">Nome da Área</label>
            <input type="text" id="area-nome" class="form-control" placeholder="Ex.: Fachada, Hall de entrada, Garagem..." />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-link link-secondary me-auto" onclick="fecharModalArea()">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-salvar-area" onclick="salvarArea()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Adicionar Item à Área -->
  <div class="modal modal-blur fade" id="modal-add-item" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Adicionar Item</h5>
          <button type="button" class="btn-close" onclick="fecharModalAddItem()"></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-danger d-none" id="additem-erro"></div>
          <div class="mb-2">
            <label class="form-label">Buscar na biblioteca</label>
            <input type="text" id="busca-item" class="form-control" placeholder="Digite para filtrar..." oninput="filtrarItens()" />
          </div>
          <div class="itens-busca-lista" id="itens-busca-lista"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-link link-secondary me-auto" onclick="fecharModalAddItem()">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-confirmar-item" onclick="confirmarAddItem()">Adicionar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
  <script type="module">
    import { requireLogin, requireRole, getUser, auth } from '/js/api.js';
    import { unidades, itens, estrutura } from '/js/api.js';

    requireLogin();
    requireRole('admin');
    document.getElementById('navbar-user').textContent = getUser()?.nome || '';

    const params    = new URLSearchParams(location.search);
    const unidadeId = params.get('id');
    if (!unidadeId) { alert('ID da unidade não informado.'); history.back(); }

    let areaAtiva        = null;
    let editandoAreaId   = null;
    let bibliotecaItens  = [];
    let itensDaArea      = [];
    let itemSelecionado  = null;

    const getModalArea    = () => window.bootstrap.Modal.getOrCreateInstance(document.getElementById('modal-area'));
    const getModalAddItem = () => window.bootstrap.Modal.getOrCreateInstance(document.getElementById('modal-add-item'));

    async function init() {
      try {
        const res = await unidades.detalhe(unidadeId);
        const u   = res.data;
        document.getElementById('titulo-unidade').textContent =
          `Estrutura — ${u.nome}${u.empresas?.nome ? ' · ' + u.empresas.nome : ''}`;
      } catch { /* ok */ }

      try {
        const r = await itens.listar(true);
        bibliotecaItens = r.data || [];
      } catch { /* ok */ }

      carregarAreas();
    }

    async function carregarAreas() {
      const div = document.getElementById('lista-areas');
      try {
        const res  = await estrutura.listarAreas(unidadeId);
        const lista = res.data || [];

        if (!lista.length) {
          div.innerHTML = '<div class="text-center text-muted py-3">Nenhuma área cadastrada.<br>Clique em "+ Área" para começar.</div>';
          return;
        }

        div.innerHTML = lista.map(a => `
          <div class="area-item ${areaAtiva?.id === a.id ? 'active' : ''} ${!a.ativo ? 'inativa' : ''}"
               onclick="selecionarArea('${a.id}','${esc(a.nome)}')">
            <span class="area-item-nome">${a.nome}${!a.ativo ? ' <em style="font-size:11px;color:#e57373">(inativa)</em>' : ''}</span>
            <div class="area-item-acoes">
              <button class="btn btn-sm btn-ghost-secondary" title="Editar"
                onclick="event.stopPropagation(); abrirEditarArea('${a.id}','${esc(a.nome)}')">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 7h-3a2 2 0 0 0 -2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2 -2v-3"/><path d="M9 15h3l8.5 -8.5a1.5 1.5 0 0 0 -3 -3l-8.5 8.5v3"/><line x1="16" y1="5" x2="19" y2="8"/></svg>
              </button>
              <button class="btn btn-sm ${a.ativo ? 'btn-ghost-danger' : 'btn-ghost-success'}" title="${a.ativo ? 'Desativar' : 'Ativar'}"
                onclick="event.stopPropagation(); toggleArea('${a.id}',${a.ativo})">
                ${a.ativo
                  ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>'
                  : '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M7 4v16l13 -8z"/></svg>'}
              </button>
            </div>
          </div>`).join('');

        if (areaAtiva) selecionarArea(areaAtiva.id, areaAtiva.nome);

      } catch (err) {
        div.innerHTML = `<div class="text-danger text-center py-3">${err.message}</div>`;
      }
    }

    window.selecionarArea = async (id, nome) => {
      areaAtiva = { id, nome };
      document.getElementById('itens-titulo').textContent = nome;
      document.getElementById('btn-add-item').classList.remove('d-none');

      document.querySelectorAll('.area-item').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.area-item').forEach(el => {
        if (el.onclick?.toString().includes(`'${id}'`)) el.classList.add('active');
      });

      await carregarItensArea();
    };

    async function carregarItensArea() {
      const div = document.getElementById('lista-itens');
      div.innerHTML = '<div class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2" role="status"></div>Carregando...</div>';
      try {
        const res = await estrutura.listarItens(areaAtiva.id);
        itensDaArea = res.data || [];

        if (!itensDaArea.length) {
          div.innerHTML = '<div class="text-center text-muted py-4">Nenhum item nesta área.<br>Clique em "+ Adicionar Item".</div>';
          return;
        }

        div.innerHTML = itensDaArea.map(i => `
          <div class="item-row">
            <span class="item-descricao">${i.descricao}</span>
            <button class="btn btn-sm btn-ghost-danger" title="Remover da área"
              onclick="removerItem('${i.area_item_id}')">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>`).join('');
      } catch (err) {
        div.innerHTML = `<div class="text-danger text-center py-3">${err.message}</div>`;
      }
    }

    window.abrirModalArea = () => {
      editandoAreaId = null;
      document.getElementById('modal-area-titulo').textContent = 'Nova Área';
      document.getElementById('area-nome').value = '';
      document.getElementById('area-erro').classList.add('d-none');
      getModalArea().show();
      setTimeout(() => document.getElementById('area-nome').focus(), 300);
    };

    window.abrirEditarArea = (id, nome) => {
      editandoAreaId = id;
      document.getElementById('modal-area-titulo').textContent = 'Editar Área';
      document.getElementById('area-nome').value = nome;
      document.getElementById('area-erro').classList.add('d-none');
      getModalArea().show();
    };

    window.fecharModalArea = () => getModalArea().hide();

    window.salvarArea = async () => {
      const nome = document.getElementById('area-nome').value.trim();
      const erro = document.getElementById('area-erro');
      const btn  = document.getElementById('btn-salvar-area');
      if (!nome) { erro.textContent = 'Nome é obrigatório.'; erro.classList.remove('d-none'); return; }
      btn.disabled = true;
      erro.classList.add('d-none');
      try {
        if (editandoAreaId) await estrutura.editarArea(editandoAreaId, { nome });
        else                await estrutura.criarArea(unidadeId, { nome });
        fecharModalArea();
        carregarAreas();
      } catch (err) {
        erro.textContent = err.message;
        erro.classList.remove('d-none');
      } finally {
        btn.disabled = false;
      }
    };

    window.toggleArea = async (id, ativo) => {
      try {
        if (ativo) await estrutura.desativarArea(id);
        else       await estrutura.ativarArea(id);
        carregarAreas();
      } catch (err) { alert(err.message); }
    };

    window.abrirModalAddItem = () => {
      itemSelecionado = null;
      document.getElementById('busca-item').value = '';
      document.getElementById('additem-erro').classList.add('d-none');
      filtrarItens();
      getModalAddItem().show();
      setTimeout(() => document.getElementById('busca-item').focus(), 300);
    };

    window.fecharModalAddItem = () => {
      getModalAddItem().hide();
      itemSelecionado = null;
    };

    window.filtrarItens = () => {
      const busca    = document.getElementById('busca-item').value.toLowerCase();
      const jaAssoc  = new Set(itensDaArea.map(i => i.item_id));
      const filtered = bibliotecaItens
        .filter(i => !jaAssoc.has(i.id))
        .filter(i => !busca || i.descricao.toLowerCase().includes(busca));

      const div = document.getElementById('itens-busca-lista');
      if (!filtered.length) {
        div.innerHTML = '<div style="padding:12px;color:#aaa;font-size:13px">Nenhum item disponível.</div>';
        return;
      }
      div.innerHTML = filtered.map(i => `
        <div class="item-opcao ${itemSelecionado === i.id ? 'selecionado' : ''}"
             onclick="selecionarItemModal('${i.id}', this)">
          ${i.descricao}
        </div>`).join('');
    };

    window.selecionarItemModal = (id, el) => {
      itemSelecionado = id;
      document.querySelectorAll('.item-opcao').forEach(e => e.classList.remove('selecionado'));
      el.classList.add('selecionado');
    };

    window.confirmarAddItem = async () => {
      const erro = document.getElementById('additem-erro');
      if (!itemSelecionado) {
        erro.textContent = 'Selecione um item da lista.'; erro.classList.remove('d-none'); return;
      }
      erro.classList.add('d-none');
      const btn = document.getElementById('btn-confirmar-item');
      btn.disabled = true;
      try {
        await estrutura.adicionarItem(areaAtiva.id, { item_id: itemSelecionado });
        fecharModalAddItem();
        carregarItensArea();
      } catch (err) {
        erro.textContent = err.message; erro.classList.remove('d-none');
      } finally {
        btn.disabled = false;
      }
    };

    window.removerItem = async (areaItemId) => {
      if (!confirm('Remover este item da área?')) return;
      try {
        await estrutura.removerItem(areaItemId);
        carregarItensArea();
      } catch (err) { alert(err.message); }
    };

    window.logout = async () => { await auth.logout(); window.location.href = '/index.html'; };

    function esc(str) { return String(str).replace(/'/g, "\\'"); }

    init();
  </script>

</body>
</html>
