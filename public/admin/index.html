<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Dashboard · VistorIA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" />
</head>
<body class="antialiased">

  <header class="navbar navbar-expand-md d-print-none">
    <div class="container-xl">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a href="/admin/index.html" class="navbar-brand">
        <img src="/img/logo-vistoria.png" alt="VistorIA" height="32" class="navbar-brand-image me-2" />
      </a>
      <div class="navbar-nav flex-row order-md-last gap-2 align-items-center">
        <span class="d-none d-md-block text-muted fs-5" id="navbar-user"></span>
        <a href="#" class="btn btn-ghost-secondary btn-icon" onclick="logout()" title="Sair">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2"/><path d="M9 12h12l-3 -3m0 6l3 -3"/></svg>
        </a>
      </div>
      <div class="collapse navbar-collapse" id="navbar-menu">
        <ul class="navbar-nav">
          <li class="nav-item active"><a href="/admin/index.html" class="nav-link"><span class="nav-link-title">Dashboard</span></a></li>
          <li class="nav-item"><a href="/admin/empresas.html" class="nav-link"><span class="nav-link-title">Empresas</span></a></li>
          <li class="nav-item"><a href="/admin/unidades.html" class="nav-link"><span class="nav-link-title">Unidades</span></a></li>
          <li class="nav-item"><a href="/admin/itens.html" class="nav-link"><span class="nav-link-title">Itens</span></a></li>
          <li class="nav-item"><a href="/admin/usuarios.html" class="nav-link"><span class="nav-link-title">Usuários</span></a></li>
        </ul>
      </div>
    </div>
  </header>

  <div class="page-wrapper">
    <div class="page-header d-print-none">
      <div class="container-xl">
        <div class="row g-2 align-items-center">
          <div class="col">
            <div class="page-pretitle">Administração</div>
            <h2 class="page-title">Dashboard</h2>
          </div>
        </div>
      </div>
    </div>

    <div class="page-body">
      <div class="container-xl">

        <!-- Stats -->
        <div class="row row-deck row-cards mb-3">
          <div class="col-sm-4">
            <div class="card">
              <div class="card-body">
                <div class="subheader">Empresas ativas</div>
                <div class="h1 mb-0" id="count-empresas">—</div>
              </div>
            </div>
          </div>
          <div class="col-sm-4">
            <div class="card">
              <div class="card-body">
                <div class="subheader">Vistorias em andamento</div>
                <div class="h1 mb-0" id="count-vistorias">—</div>
              </div>
            </div>
          </div>
          <div class="col-sm-4">
            <div class="card">
              <div class="card-body">
                <div class="subheader">Usuários cadastrados</div>
                <div class="h1 mb-0" id="count-usuarios">—</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Acesso rápido -->
        <div class="row row-cards">
          <div class="col-sm-4">
            <a href="/admin/empresas.html" class="card card-link">
              <div class="card-body text-center py-4">
                <div class="mb-2" style="font-size:2rem">🏢</div>
                <div class="fw-bold">Empresas</div>
                <div class="text-muted small">Gerenciar empresas e unidades</div>
              </div>
            </a>
          </div>
          <div class="col-sm-4">
            <a href="/admin/usuarios.html" class="card card-link">
              <div class="card-body text-center py-4">
                <div class="mb-2" style="font-size:2rem">👥</div>
                <div class="fw-bold">Usuários</div>
                <div class="text-muted small">Perfis, roles e vínculos</div>
              </div>
            </a>
          </div>
          <div class="col-sm-4">
            <a href="/analista/vistorias.html" class="card card-link">
              <div class="card-body text-center py-4">
                <div class="mb-2" style="font-size:2rem">📋</div>
                <div class="fw-bold">Vistorias</div>
                <div class="text-muted small">Acompanhar todas as vistorias</div>
              </div>
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
  <script type="module">
    import { requireLogin, requireRole, getUser, auth } from '/js/api.js';
    import { empresas, vistorias, perfis } from '/js/api.js';

    requireLogin();
    requireRole('admin');
    document.getElementById('navbar-user').textContent = getUser()?.nome || '';

    async function carregarStats() {
      try {
        const [resEmpresas, resVistorias, resPerfis] = await Promise.all([
          empresas.listar(true),
          vistorias.listar({ status: 'em_andamento' }),
          perfis.listar(true)
        ]);
        document.getElementById('count-empresas').textContent  = resEmpresas.data?.length  ?? '—';
        document.getElementById('count-vistorias').textContent = resVistorias.data?.length ?? '—';
        document.getElementById('count-usuarios').textContent  = resPerfis.data?.length    ?? '—';
      } catch (err) { console.error(err.message); }
    }

    window.logout = async () => { await auth.logout(); window.location.href = '/index.html'; };
    carregarStats();
  </script>

</body>
</html>
