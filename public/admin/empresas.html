<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Empresas · VistorIA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" />
  <style>
    .sem-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .sem-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body class="antialiased">

  <header class="navbar navbar-expand-md d-print-none">
    <div class="container-xl">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a href="/admin/index.html" class="navbar-brand">
        <img src="/img/logo-vistoria.png" alt="VistorIA" height="32" class="navbar-brand-image me-2" />
      </a>
      <div class="navbar-nav flex-row order-md-last gap-2 align-items-center">
        <span class="d-none d-md-block text-muted fs-5" id="navbar-user"></span>
        <a href="#" class="btn btn-ghost-secondary btn-icon" onclick="logout()" title="Sair">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2"/><path d="M9 12h12l-3 -3m0 6l3 -3"/></svg>
        </a>
      </div>
      <div class="collapse navbar-collapse" id="navbar-menu">
        <ul class="navbar-nav">
          <li class="nav-item"><a href="/admin/index.html" class="nav-link"><span class="nav-link-title">Dashboard</span></a></li>
          <li class="nav-item active"><a href="/admin/empresas.html" class="nav-link"><span class="nav-link-title">Empresas</span></a></li>
          <li class="nav-item"><a href="/admin/unidades.html" class="nav-link"><span class="nav-link-title">Unidades</span></a></li>
          <li class="nav-item"><a href="/admin/itens.html" class="nav-link"><span class="nav-link-title">Itens</span></a></li>
          <li class="nav-item"><a href="/admin/usuarios.html" class="nav-link"><span class="nav-link-title">Usuários</span></a></li>
        </ul>
      </div>
    </div>
  </header>

  <div class="page-wrapper">
    <div class="page-header d-print-none">
      <div class="container-xl">
        <div class="row g-2 align-items-center">
          <div class="col">
            <div class="page-pretitle">Administração</div>
            <h2 class="page-title">Empresas</h2>
          </div>
          <div class="col-auto ms-auto d-print-none">
            <button class="btn btn-primary" onclick="abrirModalCriar()">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Nova Empresa
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="page-body">
      <div class="container-xl">
        <div class="card">
          <div class="table-responsive">
            <table class="table table-vcenter table-hover card-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>CNPJ</th>
                  <th class="w-1">Status</th>
                  <th class="w-1">Ações</th>
                </tr>
              </thead>
              <tbody id="tabela-empresas">
                <tr><td colspan="4" class="text-center text-muted py-4">
                  <div class="spinner-border spinner-border-sm me-2" role="status"></div>Carregando...
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Criar / Editar -->
  <div class="modal modal-blur fade" id="modal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-titulo">Nova Empresa</h5>
          <button type="button" class="btn-close" onclick="fecharModal()"></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-danger d-none" id="modal-erro"></div>
          <div class="mb-3">
            <label class="form-label required">Nome</label>
            <input type="text" id="campo-nome" class="form-control" placeholder="Nome da empresa" />
          </div>
          <div class="mb-3">
            <label class="form-label">CNPJ</label>
            <input type="text" id="campo-cnpj" class="form-control" placeholder="00.000.000/0000-00" />
          </div>

          <!-- Semáforos -->
          <hr class="my-3" />
          <div class="mb-1">
            <label class="form-label mb-1">Semáforos de Status</label>
            <div class="text-muted small mb-2">
              Rótulos exibidos na interface e nos relatórios. Desmarcar oculta o status no formulário de ocorrências.
            </div>
            <div class="sem-row">
              <input type="checkbox" id="sem-ok-vis" class="form-check-input mt-0" title="Visível" />
              <span class="sem-dot" style="background:#388e3c"></span>
              <input type="text" id="sem-ok-label" class="form-control form-control-sm" placeholder="OK" maxlength="30" />
            </div>
            <div class="sem-row">
              <input type="checkbox" id="sem-atencao-vis" class="form-check-input mt-0" title="Visível" />
              <span class="sem-dot" style="background:#f57c00"></span>
              <input type="text" id="sem-atencao-label" class="form-control form-control-sm" placeholder="Atenção" maxlength="30" />
            </div>
            <div class="sem-row">
              <input type="checkbox" id="sem-critico-vis" class="form-check-input mt-0" title="Visível" />
              <span class="sem-dot" style="background:#c62828"></span>
              <input type="text" id="sem-critico-label" class="form-control form-control-sm" placeholder="Crítico" maxlength="30" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-link link-secondary me-auto" onclick="fecharModal()">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-salvar" onclick="salvar()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
  <script type="module">
    import { requireLogin, requireRole, getUser, auth, empresas } from '/js/api.js';

    requireLogin();
    requireRole('admin');
    document.getElementById('navbar-user').textContent = getUser()?.nome || '';

    const DEFAULTS_SEM = {
      ok:      { label: 'OK',      visivel: true },
      atencao: { label: 'Atenção', visivel: true },
      critico: { label: 'Crítico', visivel: true }
    };

    let editandoId = null;
    const getModal = () => window.bootstrap.Modal.getOrCreateInstance(document.getElementById('modal'));

    function carregarSemaforos(cfg) {
      for (const [key, def] of Object.entries(DEFAULTS_SEM)) {
        const val = cfg?.[key] || def;
        document.getElementById(`sem-${key}-label`).value   = val.label;
        document.getElementById(`sem-${key}-vis`).checked   = val.visivel !== false;
      }
    }

    function getSemaforos() {
      return {
        ok:      { label: document.getElementById('sem-ok-label').value.trim()      || 'OK',      visivel: document.getElementById('sem-ok-vis').checked },
        atencao: { label: document.getElementById('sem-atencao-label').value.trim() || 'Atenção', visivel: document.getElementById('sem-atencao-vis').checked },
        critico: { label: document.getElementById('sem-critico-label').value.trim() || 'Crítico', visivel: document.getElementById('sem-critico-vis').checked }
      };
    }

    async function carregar() {
      const tbody = document.getElementById('tabela-empresas');
      try {
        const res = await empresas.listar();
        if (!res.data?.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Nenhuma empresa cadastrada.</td></tr>';
          return;
        }
        tbody.innerHTML = res.data.map(e => `
          <tr>
            <td class="fw-medium">${e.nome}</td>
            <td class="text-muted">${e.cnpj || '—'}</td>
            <td><span class="badge ${e.ativo ? 'bg-success-lt text-success' : 'bg-danger-lt text-danger'}">${e.ativo ? 'Ativa' : 'Inativa'}</span></td>
            <td class="text-nowrap">
              <button class="btn btn-sm btn-ghost-secondary" onclick="editar('${e.id}')">Editar</button>
              <button class="btn btn-sm ${e.ativo ? 'btn-ghost-danger' : 'btn-ghost-success'}" onclick="toggleAtivo('${e.id}',${e.ativo})">${e.ativo ? 'Desativar' : 'Ativar'}</button>
            </td>
          </tr>`).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-danger text-center">${err.message}</td></tr>`;
      }
    }

    window.abrirModalCriar = () => {
      editandoId = null;
      document.getElementById('modal-titulo').textContent = 'Nova Empresa';
      document.getElementById('campo-nome').value = '';
      document.getElementById('campo-cnpj').value = '';
      document.getElementById('modal-erro').classList.add('d-none');
      carregarSemaforos(null);
      getModal().show();
    };

    window.editar = async (id) => {
      editandoId = id;
      document.getElementById('modal-titulo').textContent = 'Editar Empresa';
      document.getElementById('modal-erro').classList.add('d-none');
      document.getElementById('campo-nome').value = '';
      document.getElementById('campo-cnpj').value = '';
      carregarSemaforos(null);
      getModal().show();
      try {
        const res = await empresas.detalhe(id);
        const e = res.data;
        document.getElementById('campo-nome').value = e.nome || '';
        document.getElementById('campo-cnpj').value = e.cnpj || '';
        carregarSemaforos(e.configuracao_semaforos);
      } catch (err) {
        document.getElementById('modal-erro').textContent = 'Erro ao carregar dados: ' + err.message;
        document.getElementById('modal-erro').classList.remove('d-none');
      }
    };

    window.fecharModal = () => getModal().hide();

    window.salvar = async () => {
      const nome = document.getElementById('campo-nome').value.trim();
      const cnpj = document.getElementById('campo-cnpj').value.trim();
      const erroEl = document.getElementById('modal-erro');
      const btn = document.getElementById('btn-salvar');
      if (!nome) { erroEl.textContent = 'Nome é obrigatório.'; erroEl.classList.remove('d-none'); return; }
      btn.disabled = true;
      erroEl.classList.add('d-none');
      try {
        const body = { nome, cnpj: cnpj || null, configuracao_semaforos: getSemaforos() };
        if (editandoId) await empresas.editar(editandoId, body);
        else            await empresas.criar(body);
        fecharModal();
        carregar();
      } catch (err) {
        erroEl.textContent = err.message;
        erroEl.classList.remove('d-none');
      } finally { btn.disabled = false; }
    };

    window.toggleAtivo = async (id, ativo) => {
      try {
        if (ativo) await empresas.desativar(id);
        else       await empresas.ativar(id);
        carregar();
      } catch (err) { alert(err.message); }
    };

    window.logout = async () => { await auth.logout(); window.location.href = '/index.html'; };

    carregar();
  </script>
</body>
</html>
