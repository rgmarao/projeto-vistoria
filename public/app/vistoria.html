<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1565c0" />
  <title>Vistoria</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/app/app.css" />
  <style>
    /* ── Occurrence blocks ───────────────────────── */
    .ocorrencia-block {
      background: #f8f9fb;
      border: 1px solid #e8eaf0;
      border-left: 3px solid #90a4ae;
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
    }
    .ocorrencia-block:first-of-type {
      margin-top: 8px;
    }
    .oc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .oc-num {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #90a4ae;
    }
    .btn-remove-oc {
      background: none;
      border: none;
      color: #ccc;
      font-size: 14px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .btn-remove-oc:active { background: #fee; color: #d32f2f; }

    .rec-field { display: none; margin-top: 8px; }
    .rec-field.visivel { display: block; }
    .rec-input {
      border-color: #ff9800 !important;
      background: #fff8f0 !important;
    }
    .rec-input::placeholder { color: #e65100; opacity: .7; }

    .btn-add-oc {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      background: none;
      border: 1.5px dashed #90caf9;
      color: #1565c0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn-add-oc:active { background: #e3f2fd; }
  </style>
</head>
<body>

  <header class="app-header">
    <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
      <button onclick="history.back()"
        style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0;line-height:1;flex-shrink:0">
        ‹
      </button>
      <div style="min-width:0">
        <h1 style="font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="h-titulo">Carregando...</h1>
        <div class="sub" id="h-sub"></div>
      </div>
    </div>
    <span id="auto-save-ind"
      style="color:rgba(255,255,255,.7);font-size:12px;flex-shrink:0;margin-left:8px;transition:opacity .3s;opacity:0">
      ✓ Salvo
    </span>
  </header>

  <!-- Barra de progresso -->
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-txt" id="prog-txt"></div>

  <!-- Áreas + Itens -->
  <div id="checklist"></div>

  <!-- Input file oculto para câmera -->
  <input type="file" id="file-input" accept="image/*" capture="environment"
    style="display:none" onchange="onFotoCapturada()" />

  <div class="pb-bar"></div>

  <!-- Barra inferior -->
  <div class="bottom-bar">
    <button class="btn-bar btn-bar-sec"  onclick="voltarHome()">← Voltar</button>
    <button class="btn-bar btn-bar-prim" onclick="finalizarVistoria()">✅ Finalizar</button>
  </div>

  <script type="module">
    import { isLoggedIn } from '/js/api.js';
    import { db, uuid } from '/js/db.js';

    if (!isLoggedIn()) { window.location.replace('/app/index.html'); }

    const params      = new URLSearchParams(location.search);
    const localId     = params.get('local_id');
    const unidadeId   = params.get('unidade_id');
    const nomeParam   = params.get('nome')    || '';
    const empresaParam = params.get('empresa') || '';

    let vistoria = null;
    let fotoAlvo = null; // { ai, ii, oi, slot }

    function novaOcorrencia() {
      return { local_id: uuid(), situacao: null, descricao: '', recomendacao: '', foto1: null, foto2: null };
    }

    // ── Migração de formato antigo ────────────────
    function migrarFormatoAntigo(vis) {
      let migrou = false;
      for (const area of vis.areas || []) {
        for (const item of area.itens || []) {
          if (!item.ocorrencias) {
            item.ocorrencias = [{
              local_id:     uuid(),
              situacao:     item.situacao     || null,
              descricao:    item.observacao   || '',
              recomendacao: '',
              foto1:        item.foto1        || null,
              foto2:        item.foto2        || null
            }];
            delete item.situacao;
            delete item.observacao;
            delete item.foto1;
            delete item.foto2;
            migrou = true;
          }
        }
      }
      return migrou;
    }

    // ── Inicialização ─────────────────────────────
    async function init() {
      if (localId) {
        vistoria = await db.getVistoria(localId);
        if (!vistoria) { alert('Rascunho não encontrado.'); history.back(); return; }
        // Migra formato antigo (se necessário)
        if (migrarFormatoAntigo(vistoria)) await db.salvarVistoria(vistoria);
      } else {
        const cl = await db.getChecklist(unidadeId);
        if (!cl) {
          alert('Estrutura desta unidade não encontrada no dispositivo.\n\nConecte-se à internet e acesse a tela inicial para baixar o checklist.');
          history.back(); return;
        }
        if (!cl.areas?.length) {
          alert('Esta unidade não possui áreas configuradas.\nConfigure a estrutura na web antes de fazer a vistoria.');
          history.back(); return;
        }
        vistoria = {
          local_id:     uuid(),
          unidade_id:   unidadeId,
          unidade_nome: cl.unidade_nome || nomeParam,
          empresa_nome: cl.empresa_nome || empresaParam,
          status:       'rascunho',
          created_at:   new Date().toISOString(),
          updated_at:   new Date().toISOString(),
          areas: cl.areas.map(a => ({
            area_id:   a.area_id,
            area_nome: a.area_nome,
            itens: a.itens.map(i => ({
              area_item_id: i.area_item_id,
              item_id:      i.item_id,
              descricao:    i.descricao,
              ocorrencias:  [novaOcorrencia()]
            }))
          }))
        };
        await db.salvarVistoria(vistoria);
      }

      document.getElementById('h-titulo').textContent = vistoria.unidade_nome;
      document.getElementById('h-sub').textContent    = vistoria.empresa_nome || '';
      renderTudo();
    }

    // ── Render completo ───────────────────────────
    function renderTudo() {
      const div = document.getElementById('checklist');
      if (!vistoria.areas?.length) {
        div.innerHTML = '<div class="empty"><span>📋</span>Nenhuma área configurada.</div>';
        return;
      }
      div.innerHTML = vistoria.areas.map((area, ai) => renderArea(area, ai)).join('');
      atualizarProgresso();
    }

    function renderArea(area, ai) {
      const preench = area.itens.filter(itemPreenchido).length;
      const total   = area.itens.length;
      return `
        <div class="area-section" id="area-sec-${ai}">
          <div class="area-header" id="area-hdr-${ai}" onclick="toggleArea(${ai})">
            <h3>${area.area_nome}</h3>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="count" id="area-cnt-${ai}">${preench}/${total}</span>
              <span class="arrow" id="area-arr-${ai}">▾</span>
            </div>
          </div>
          <div class="area-body" id="area-body-${ai}">
            ${area.itens.map((item, ii) => renderItem(ai, ii, item)).join('')}
          </div>
        </div>`;
    }

    function renderItem(ai, ii, item) {
      return `
        <div class="item-check" id="item-${ai}-${ii}">
          <div class="item-desc">${item.descricao}</div>
          <div id="ocs-${ai}-${ii}">
            ${item.ocorrencias.map((oc, oi) => renderOcorrencia(ai, ii, oi, oc, item.ocorrencias.length)).join('')}
          </div>
          <button class="btn-add-oc" onclick="adicionarOcorrencia(${ai},${ii})">+ Adicionar ocorrência</button>
        </div>`;
    }

    function renderOcorrencia(ai, ii, oi, oc, totalOcs) {
      const podRemover = totalOcs > 1;
      const recVisivel = oc.situacao === 'atencao';
      return `
        <div class="ocorrencia-block" id="oc-block-${ai}-${ii}-${oi}">
          <div class="oc-header">
            <span class="oc-num">Ocorrência ${oi + 1}</span>
            ${podRemover
              ? `<button class="btn-remove-oc" onclick="removerOcorrencia(${ai},${ii},${oi})" title="Remover ocorrência">✕</button>`
              : ''}
          </div>
          <div class="status-row">
            <button class="btn-status ok ${oc.situacao === 'ok' ? 'ativo' : ''}"
              data-status="ok" onclick="setSituacao(${ai},${ii},${oi},'ok')">✅ OK</button>
            <button class="btn-status atencao ${oc.situacao === 'atencao' ? 'ativo' : ''}"
              data-status="atencao" onclick="setSituacao(${ai},${ii},${oi},'atencao')">⚠️&nbsp;Atenção</button>
            <button class="btn-status critico ${oc.situacao === 'critico' ? 'ativo' : ''}"
              data-status="critico" onclick="setSituacao(${ai},${ii},${oi},'critico')">🚨 Crítico</button>
          </div>
          <div class="field-group">
            <span class="field-label">Descrição</span>
            <textarea class="obs-input" rows="2"
              placeholder="Descreva o que foi encontrado..."
              onchange="setDescricao(${ai},${ii},${oi},this.value)">${oc.descricao || ''}</textarea>
          </div>
          <div class="rec-field ${recVisivel ? 'visivel' : ''}" id="rec-${ai}-${ii}-${oi}">
            <span class="field-label">Recomendação</span>
            <textarea class="obs-input" rows="2"
              placeholder="O que deve ser feito para corrigir..."
              onchange="setRecomendacao(${ai},${ii},${oi},this.value)">${oc.recomendacao || ''}</textarea>
          </div>
          <div class="foto-row">
            ${renderFotoSlot(ai, ii, oi, 1, oc.foto1)}
            ${renderFotoSlot(ai, ii, oi, 2, oc.foto2)}
          </div>
        </div>`;
    }

    function renderFotoSlot(ai, ii, oi, slot, dataUrl) {
      if (dataUrl) {
        return `
          <div class="foto-slot" id="foto-${ai}-${ii}-${oi}-${slot}">
            <img src="${dataUrl}" alt="Foto ${slot}" onclick="verFoto('${dataUrl}')" />
            <button class="foto-del" onclick="removerFoto(${ai},${ii},${oi},${slot})">✕</button>
          </div>`;
      }
      return `
        <div class="foto-slot" id="foto-${ai}-${ii}-${oi}-${slot}"
          onclick="tirarFoto(${ai},${ii},${oi},${slot})"
          style="flex-direction:column">
          <div class="ph">📷</div>
          <div class="ph-txt">Foto ${slot}</div>
        </div>`;
    }

    // ── Interações ────────────────────────────────
    window.toggleArea = (ai) => {
      const body = document.getElementById(`area-body-${ai}`);
      const hdr  = document.getElementById(`area-hdr-${ai}`);
      const arr  = document.getElementById(`area-arr-${ai}`);
      const open = body.classList.toggle('open');
      hdr.classList.toggle('open', open);
      arr.textContent = open ? '▴' : '▾';
    };

    window.setSituacao = async (ai, ii, oi, situacao) => {
      vistoria.areas[ai].itens[ii].ocorrencias[oi].situacao = situacao;
      // Atualiza botões sem re-render
      const block = document.getElementById(`oc-block-${ai}-${ii}-${oi}`);
      block?.querySelectorAll('.btn-status').forEach(btn => {
        btn.classList.toggle('ativo', btn.dataset.status === situacao);
      });
      // Mostra/esconde campo de recomendação (somente atenção)
      const rec = document.getElementById(`rec-${ai}-${ii}-${oi}`);
      if (rec) rec.classList.toggle('visivel', situacao === 'atencao');
      atualizarContadorArea(ai);
      atualizarProgresso();
      await autoSalvar();
    };

    window.setDescricao = async (ai, ii, oi, valor) => {
      vistoria.areas[ai].itens[ii].ocorrencias[oi].descricao = valor;
      await autoSalvar();
    };

    window.setRecomendacao = async (ai, ii, oi, valor) => {
      vistoria.areas[ai].itens[ii].ocorrencias[oi].recomendacao = valor;
      await autoSalvar();
    };

    window.adicionarOcorrencia = async (ai, ii) => {
      const item = vistoria.areas[ai].itens[ii];
      item.ocorrencias.push(novaOcorrencia());
      await autoSalvar();
      // Re-render só as ocorrências deste item
      document.getElementById(`ocs-${ai}-${ii}`).innerHTML =
        item.ocorrencias.map((oc, oi) => renderOcorrencia(ai, ii, oi, oc, item.ocorrencias.length)).join('');
    };

    window.removerOcorrencia = async (ai, ii, oi) => {
      const item = vistoria.areas[ai].itens[ii];
      if (item.ocorrencias.length <= 1) return;
      if (!confirm('Remover esta ocorrência?')) return;
      item.ocorrencias.splice(oi, 1);
      await autoSalvar();
      document.getElementById(`ocs-${ai}-${ii}`).innerHTML =
        item.ocorrencias.map((oc, oi2) => renderOcorrencia(ai, ii, oi2, oc, item.ocorrencias.length)).join('');
      atualizarContadorArea(ai);
      atualizarProgresso();
    };

    // Foto
    window.tirarFoto = (ai, ii, oi, slot) => {
      fotoAlvo = { ai, ii, oi, slot };
      const inp = document.getElementById('file-input');
      inp.value = '';
      inp.click();
    };

    window.onFotoCapturada = () => {
      const file = document.getElementById('file-input').files[0];
      if (!file || !fotoAlvo) return;

      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = async () => {
        const MAX = 1200;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataURL = canvas.toDataURL('image/jpeg', 0.8);
        URL.revokeObjectURL(url);

        const { ai, ii, oi, slot } = fotoAlvo;
        const oc = vistoria.areas[ai].itens[ii].ocorrencias[oi];
        if (slot === 1) oc.foto1 = dataURL;
        else            oc.foto2 = dataURL;
        await autoSalvar();

        const slotEl = document.getElementById(`foto-${ai}-${ii}-${oi}-${slot}`);
        if (slotEl) slotEl.outerHTML = renderFotoSlot(ai, ii, oi, slot, dataURL);
        fotoAlvo = null;
      };
      img.src = url;
    };

    window.removerFoto = async (ai, ii, oi, slot) => {
      if (!confirm('Remover esta foto?')) return;
      const oc = vistoria.areas[ai].itens[ii].ocorrencias[oi];
      if (slot === 1) oc.foto1 = null;
      else            oc.foto2 = null;
      await autoSalvar();
      const slotEl = document.getElementById(`foto-${ai}-${ii}-${oi}-${slot}`);
      if (slotEl) slotEl.outerHTML = renderFotoSlot(ai, ii, oi, slot, null);
    };

    window.verFoto = (dataUrl) => {
      const w = window.open('', '_blank');
      w.document.write(`<body style="margin:0;background:#000"><img src="${dataUrl}" style="max-width:100%;max-height:100vh;display:block;margin:auto"></body>`);
    };

    // ── Progresso ─────────────────────────────────
    function itemPreenchido(item) {
      return item.ocorrencias?.some(oc => oc.situacao !== null) ?? false;
    }

    function atualizarContadorArea(ai) {
      const area = vistoria.areas[ai];
      const cnt  = document.getElementById(`area-cnt-${ai}`);
      if (cnt) cnt.textContent = `${area.itens.filter(itemPreenchido).length}/${area.itens.length}`;
    }

    function atualizarProgresso() {
      const total   = vistoria.areas.reduce((s, a) => s + a.itens.length, 0);
      const preench = vistoria.areas.reduce((s, a) => s + a.itens.filter(itemPreenchido).length, 0);
      const pct = total ? Math.round(preench / total * 100) : 0;
      document.getElementById('prog-fill').style.width = pct + '%';
      document.getElementById('prog-txt').textContent  = `${preench} de ${total} itens preenchidos (${pct}%)`;
    }

    // ── Persistência ──────────────────────────────
    async function autoSalvar() {
      vistoria.updated_at = new Date().toISOString();
      await db.salvarVistoria(vistoria);
      const ind = document.getElementById('auto-save-ind');
      if (ind) {
        ind.style.opacity = '1';
        clearTimeout(ind._t);
        ind._t = setTimeout(() => { ind.style.opacity = '0'; }, 1500);
      }
    }

    window.voltarHome = async () => {
      vistoria.status = vistoria.status === 'pronto' ? 'pronto' : 'rascunho';
      await autoSalvar();
      window.location.replace('/app/home.html');
    };

    window.finalizarVistoria = async () => {
      const total   = vistoria.areas.reduce((s, a) => s + a.itens.length, 0);
      const preench = vistoria.areas.reduce((s, a) => s + a.itens.filter(itemPreenchido).length, 0);

      if (preench === 0) {
        alert('Avalie pelo menos um item antes de finalizar.');
        return;
      }
      if (preench < total) {
        const ok = confirm(`${total - preench} item(ns) ainda sem avaliação.\nDeseja finalizar assim mesmo?`);
        if (!ok) return;
      }

      vistoria.status = 'pronto';
      await autoSalvar();
      alert('✅ Vistoria finalizada!\nEla ficará salva aqui até você sincronizar com a internet.');
      window.location.replace('/app/home.html');
    };

    function abrirPrimeiraArea() {
      const body = document.getElementById('area-body-0');
      const hdr  = document.getElementById('area-hdr-0');
      const arr  = document.getElementById('area-arr-0');
      if (body) { body.classList.add('open'); hdr?.classList.add('open'); if (arr) arr.textContent = '▴'; }
    }

    init().then(abrirPrimeiraArea);
  </script>

</body>
</html>
