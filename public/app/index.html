<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1565c0" />
  <title>Vistoria Online</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: #1565c0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 28px 28px;
      width: calc(100% - 32px);
      max-width: 380px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo .icon { font-size: 52px; display: block; line-height: 1; }
    .logo h1 { font-size: 22px; color: #1565c0; font-weight: 700; margin: 10px 0 4px; }
    .logo p  { font-size: 13px; color: #999; margin: 0; }

    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; margin-top: 16px; }
    input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #1565c0; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity .15s;
    }
    .btn-login:disabled { opacity: .6; cursor: default; }

    .erro {
      color: #c62828;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
    }
    .link-web {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #aaa;
      text-decoration: none;
    }
    .link-web:hover { color: #1565c0; }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <span class="icon">🏗️</span>
      <h1>Vistoria Online</h1>
      <p>Aplicativo de campo</p>
    </div>

    <label for="email">E-mail</label>
    <input type="email"    id="email" placeholder="seu@email.com"  autocomplete="email" />

    <label for="senha">Senha</label>
    <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />

    <div class="erro" id="erro"></div>

    <button class="btn-login" id="btn-login" onclick="login()">Entrar</button>

    <a class="link-web" href="/index.html">Acessar painel web →</a>
  </div>

  <script type="module">
    import { isLoggedIn, saveSession } from '/js/api.js';

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
    }

    // Se já logado, vai direto para home
    if (isLoggedIn()) window.location.replace('/app/home.html');

    window.login = async () => {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const erro  = document.getElementById('erro');
      const btn   = document.getElementById('btn-login');

      erro.textContent = '';
      if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha.'; return; }

      btn.disabled    = true;
      btn.textContent = 'Entrando...';

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password: senha })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Credenciais inválidas');

        saveSession(data.token, data.user);
        window.location.href = '/app/home.html';
      } catch (err) {
        erro.textContent = err.message;
        btn.disabled    = false;
        btn.textContent = 'Entrar';
      }
    };

    // Enter para logar
    document.addEventListener('keydown', e => { if (e.key === 'Enter') window.login(); });
  </script>

</body>
</html>
