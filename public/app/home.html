<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1b3a6b" />
  <title>VistorIA</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/app/app.css" />
</head>
<body>

  <header class="app-header">
    <img src="/img/logo-vistoria.png" alt="VistorIA"
      style="height:30px;width:auto;flex-shrink:0;filter:brightness(0) invert(1)" />
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
      <span id="conn-badge" title="Status de conexão"></span>
      <button id="btn-avatar" onclick="toggleMenu(event)"
        style="width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;overflow:hidden;flex-shrink:0"
        title="Menu do usuário">
        <img id="avatar-img" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none" />
        <svg id="avatar-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </button>
    </div>
  </header>

  <!-- Menu do usuário -->
  <div id="user-menu" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200" onclick="fecharMenu()">
    <div onclick="event.stopPropagation()"
      style="position:absolute;top:58px;right:12px;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(27,58,107,.2);min-width:220px;overflow:hidden">
      <div style="padding:16px;background:var(--brand-navy);color:#fff">
        <div id="menu-nome" style="font-size:15px;font-weight:600"></div>
        <div id="menu-email" style="font-size:12px;opacity:.7;margin-top:3px"></div>
      </div>
      <button onclick="fecharMenu();limparCache()"
        style="width:100%;padding:14px 16px;border:none;background:none;text-align:left;font-size:14px;color:var(--text-primary);cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Limpar Cache
      </button>
      <button onclick="fecharMenu();logout()"
        style="width:100%;padding:14px 16px;border:none;background:none;text-align:left;font-size:14px;color:#c62828;cursor:pointer;display:flex;align-items:center;gap:10px">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </div>

  <!-- Barra de sincronização (aparece quando há prontos) -->
  <div class="sync-bar" id="sync-bar" style="display:none">
    <span id="sync-msg"></span>
    <button class="btn-sync" id="btn-sync" onclick="sincronizar()">Sincronizar</button>
  </div>

  <!-- Minhas Unidades -->
  <div class="section-label">Minhas Unidades</div>
  <div id="lista-unidades">
    <div class="empty"><span>⏳</span>Carregando unidades...</div>
  </div>

  <!-- Rascunhos / Prontos -->
  <div id="secao-rascunhos" style="display:none">
    <div class="section-label">Em andamento</div>
    <div id="lista-rascunhos"></div>
  </div>

  <div class="pb-bar"></div>

  <script type="module">
    import { isLoggedIn, getUser, getToken, clearSession } from '/js/api.js';
    import { db, dataURLtoBlob } from '/js/db.js';

    if (!isLoggedIn()) { window.location.replace('/app/index.html'); }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
      // Recarrega quando novo SW assume → garante arquivos atualizados
      navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
    }

    const user = getUser();
    const nome  = user?.nome?.trim();
    const email = user?.email || '';
    document.getElementById('menu-nome').textContent  = nome || email || 'Usuário';
    document.getElementById('menu-email').textContent = nome ? email : '';

    window.toggleMenu = (e) => {
      e.stopPropagation();
      const m = document.getElementById('user-menu');
      m.style.display = m.style.display === 'none' ? '' : 'none';
    };
    window.fecharMenu = () => {
      document.getElementById('user-menu').style.display = 'none';
    };

    // ── Indicador de conexão ──────────────────────────────────
    function atualizarConexao() {
      const el = document.getElementById('conn-badge');
      if (navigator.onLine) {
        el.innerHTML = '<span class="online-dot"></span>';
        el.title = 'Online';
      } else {
        el.innerHTML = '<span class="offline-dot"></span>';
        el.title = 'Offline — dados salvos localmente';
      }
    }
    atualizarConexao();
    window.addEventListener('online',  () => { atualizarConexao(); carregarUnidades(); });
    window.addEventListener('offline', atualizarConexao);

    // ── Carrega unidades ──────────────────────────────────────
    async function carregarUnidades() {
      const div = document.getElementById('lista-unidades');
      let unidades = [];

      if (navigator.onLine) {
        try {
          // Busca unidades vinculadas ao perfil do usuário
          const r = await fetch(`/api/perfis/${user.id}/unidades`, {
            headers: { Authorization: 'Bearer ' + getToken() }
          });
          const d = await r.json();
          unidades = (d.data || []).map(v => v.unidades).filter(Boolean);

          // Baixa e armazena checklist de cada unidade em cache
          for (const u of unidades) {
            try {
              const rc = await fetch(`/api/unidades/${u.id}/checklist`, {
                headers: { Authorization: 'Bearer ' + getToken() }
              });
              const dc = await rc.json();
              if (dc.ok && dc.data) {
                await db.salvarChecklist({
                  unidade_id:   u.id,
                  unidade_nome: u.nome,
                  empresa_nome: u.empresas?.nome || '',
                  endereco:     u.endereco || '',
                  areas:        dc.data,
                  cached_at:    new Date().toISOString()
                });
              }
            } catch { /* falha parcial — OK */ }
          }
        } catch { /* sem rede */ }
      }

      // Fallback: usa checklists em cache
      if (!unidades.length) {
        const cached = await db.listarChecklists();
        unidades = cached.map(c => ({
          id:       c.unidade_id,
          nome:     c.unidade_nome,
          empresas: { nome: c.empresa_nome },
          endereco: c.endereco,
          _cached:  true
        }));
      }

      if (!unidades.length) {
        div.innerHTML = '<div class="empty"><span>🏢</span>Nenhuma unidade vinculada à sua conta.<br>Contate o administrador.</div>';
        return;
      }

      div.innerHTML = unidades.map(u => `
        <div class="unit-card">
          <div class="unit-card-info">
            <h3>${u.nome}</h3>
            <p>${u.empresas?.nome || ''}${u._cached ? ' · <em>cache</em>' : ''}</p>
          </div>
          <button class="btn-nova"
            onclick="novaVistoria('${u.id}','${esc(u.nome)}','${esc(u.empresas?.nome||'')}')">
            + Nova
          </button>
        </div>`).join('');
    }

    // ── Carrega rascunhos e prontos ───────────────────────────
    async function carregarRascunhos() {
      const todos  = await db.listarVistorias();
      const ativos = todos.filter(v => v.status !== 'sincronizado');
      const prontos = ativos.filter(v => v.status === 'pronto');

      // Sync bar
      const syncBar = document.getElementById('sync-bar');
      if (prontos.length) {
        syncBar.style.display = 'flex';
        document.getElementById('sync-msg').textContent =
          `${prontos.length} vistoria(s) pronta(s) para envio`;
      } else {
        syncBar.style.display = 'none';
      }

      const secao = document.getElementById('secao-rascunhos');
      const div   = document.getElementById('lista-rascunhos');

      if (!ativos.length) { secao.style.display = 'none'; return; }
      secao.style.display = '';

      div.innerHTML = ativos
        .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
        .map(v => {
          const totalItens = v.areas?.reduce((s, a) => s + (a.itens?.length || 0), 0) || 0;
          const preench    = v.areas?.reduce((s, a) => s + (a.itens?.filter(i =>
            i.ocorrencias?.some(oc => oc.situacao !== null) ?? false
          ).length || 0), 0) || 0;
          const label      = v.status === 'pronto' ? '✅ Pronto para envio' : `✏️ ${preench}/${totalItens} itens`;
          return `
            <div class="draft-card ${v.status === 'pronto' ? 'pronto' : ''}">
              <div class="draft-card-info">
                <h3>${v.unidade_nome}</h3>
                <p>${new Date(v.created_at).toLocaleDateString('pt-BR')} · ${label}</p>
              </div>
              <div class="draft-acoes">
                ${v.status === 'rascunho'
                  ? `<button class="btn-continuar" onclick="continuarVistoria('${v.local_id}')">Continuar</button>`
                  : ''}
                <button class="btn-excluir" onclick="excluirRascunho('${v.local_id}')">🗑</button>
              </div>
            </div>`;
        }).join('');
    }

    // ── Ações de navegação ────────────────────────────────────
    window.novaVistoria = async (unidade_id, nome, empresa) => {
      // Alerta se já existe vistoria desta unidade criada hoje
      const hoje = new Date().toDateString();
      const todas = await db.listarVistorias();
      const duplicata = todas.find(v =>
        v.unidade_id === unidade_id &&
        v.status !== 'sincronizado' &&
        new Date(v.created_at).toDateString() === hoje
      );
      if (duplicata) {
        const continuar = confirm(
          `⚠️ Já existe uma vistoria em andamento para "${nome}" criada hoje.\n\nDeseja criar uma nova mesmo assim?`
        );
        if (!continuar) return;
      }
      const p = new URLSearchParams({ unidade_id, nome, empresa });
      window.location.href = '/app/vistoria.html?' + p;
    };

    window.continuarVistoria = (local_id) => {
      window.location.href = '/app/vistoria.html?local_id=' + local_id;
    };

    window.excluirRascunho = async (local_id) => {
      if (!confirm('Excluir este rascunho? Os dados não poderão ser recuperados.')) return;
      await db.deletarVistoria(local_id);
      carregarRascunhos();
    };

    // ── Sincronização ─────────────────────────────────────────
    window.sincronizar = async () => {
      if (!navigator.onLine) {
        alert('Sem conexão. Conecte-se à internet e tente novamente.');
        return;
      }
      const btn = document.getElementById('btn-sync');
      btn.disabled    = true;
      btn.textContent = 'Enviando...';

      const todos   = await db.listarVistorias();
      const prontos = todos.filter(v => v.status === 'pronto');
      let ok = 0;
      const errosMsgs = [];

      for (const v of prontos) {
        try {
          await enviarVistoria(v);
          ok++;
        } catch (err) {
          errosMsgs.push(`• ${v.unidade_nome}: ${err.message}`);
          console.error('[sync]', v.local_id, err.message);
        }
      }

      btn.disabled    = false;
      btn.textContent = 'Sincronizar';
      if (errosMsgs.length > 0) {
        alert(`${ok} enviada(s) com sucesso.\n\nErro(s):\n${errosMsgs.join('\n')}`);
      } else {
        alert(`✅ ${ok} vistoria(s) enviada(s) com sucesso!`);
      }
      carregarRascunhos();
    };

    async function enviarVistoria(v) {
      const token   = getToken();
      const headers = { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token };

      // 1. Cria vistoria no servidor (pula se já foi enviada antes)
      let visId = v.server_id || null;
      if (!visId) {
        const rVis = await fetch('/api/vistorias', {
          method: 'POST', headers,
          body: JSON.stringify({ unidade_id: v.unidade_id })
        });
        const dVis = await rVis.json();
        if (!rVis.ok) throw new Error(dVis.error || 'Erro ao criar vistoria');
        visId = dVis.vistoria?.id || dVis.data?.id;
        // Salva server_id imediatamente para evitar duplicação em caso de retentativa
        await db.salvarVistoria({ ...v, server_id: visId });
      }

      // 2. Cria ocorrências (uma por ocorrência de cada item avaliado)
      for (const area of v.areas || []) {
        for (const item of area.itens || []) {
          for (const oc of item.ocorrencias || []) {
            if (!oc.situacao) continue; // não avaliado → pula

            const rOc = await fetch(`/api/vistorias/${visId}/ocorrencias`, {
              method: 'POST', headers,
              body: JSON.stringify({
                area_id:      area.area_id  || null,
                item_id:      item.item_id  || null,
                descricao:    oc.descricao  || item.descricao,
                status:       oc.situacao,
                origem:       'app',
                recomendacao: oc.recomendacao || null
              })
            });
            const dOc = await rOc.json();
            if (!rOc.ok) continue;
            const ocId = dOc.data?.id || dOc.ocorrencia?.id;

            // 3. Upload das fotos
            for (const slot of [1, 2]) {
              const fotoData = slot === 1 ? oc.foto1 : oc.foto2;
              if (!fotoData || !ocId) continue;
              try {
                const fd = new FormData();
                fd.append('foto', dataURLtoBlob(fotoData), `foto_slot${slot}.jpg`);
                fd.append('slot', String(slot));
                await fetch(`/api/ocorrencias/${ocId}/fotos`, {
                  method: 'POST',
                  headers: { Authorization: 'Bearer ' + token },
                  body: fd
                });
              } catch { /* foto falhou — não bloqueia */ }
            }
          }
        }
      }

      // 4. Marca como sincronizado
      await db.salvarVistoria({ ...v, status: 'sincronizado', server_id: visId });
    }

    window.logout = async () => {
      if (!confirm('Sair do aplicativo?')) return;
      clearSession();
      window.location.replace('/app/index.html');
    };

    window.limparCache = async () => {
      const rascunhos = (await db.listarVistorias()).filter(v => v.status !== 'sincronizado');
      const aviso = rascunhos.length
        ? `⚠️ Atenção: você tem ${rascunhos.length} vistoria(s) não enviada(s). Elas serão perdidas.\n\nDeseja limpar mesmo assim?`
        : 'Limpar checklists em cache? (vistorias pendentes não serão afetadas)';
      if (!confirm(aviso)) return;
      const db2 = indexedDB.deleteDatabase('vistoria-offline');
      db2.onsuccess = () => { alert('Cache limpo. O app será recarregado.'); location.reload(); };
      db2.onerror  = () => alert('Erro ao limpar cache.');
    };

    function esc(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    // Init
    carregarUnidades();
    carregarRascunhos();
  </script>

</body>
</html>
