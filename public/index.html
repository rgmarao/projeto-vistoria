<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VistorIA — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-logo img { max-height: 72px; margin-bottom: 8px; }
  </style>
</head>
<body class="antialiased">
  <div class="container-tight py-4">
    <div class="text-center mb-4 login-logo">
      <img src="/img/logo-vistoria.png" alt="VistorIA" />
      <p class="text-muted mt-1">Acesse sua conta para continuar</p>
    </div>
    <div class="card card-md">
      <div class="card-body">
        <div class="alert alert-danger d-none" id="alert-erro"></div>
        <form id="form-login">
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autofocus />
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" id="senha" class="form-control" placeholder="••••••••" required />
          </div>
          <div class="form-footer">
            <button type="submit" class="btn btn-primary w-100" id="btn-entrar">Entrar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
  <script type="module">
    import { auth, saveSession, isLoggedIn, getUser } from '/js/api.js';

    if (isLoggedIn()) redirecionar(getUser());

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('btn-entrar');
      const alrt  = document.getElementById('alert-erro');
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      alrt.classList.add('d-none');
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const data = await auth.login(email, senha);
        const res  = await fetch(`/api/perfis/${data.user.id}`, {
          headers: { 'Authorization': `Bearer ${data.token}` }
        });
        const perfilData = await res.json();
        const user = {
          id:     data.user.id,
          email:  data.user.email,
          nome:   perfilData.data?.nome || data.user.email,
          perfil: perfilData.data?.perfil || 'usuario'
        };
        saveSession(data.token, user);
        redirecionar(user);
      } catch (err) {
        alrt.textContent = err.message;
        alrt.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });

    function redirecionar(user) {
      if (user.perfil === 'admin') window.location.href = '/admin/index.html';
      else window.location.href = '/analista/index.html';
    }
  </script>
</body>
</html>
